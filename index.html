const mailAuto = async (aan, onderwerp, tekst, afzender) => {
  const r = await fetch("/api/send-mail", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ to: aan, subject: onderwerp, text: tekst, fromName: afzender }),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || "Mailen mislukt");
};

const vulSjabloon = (tpl, ctx) =>
  Object.entries(ctx).reduce((t, [k, v]) => t.replaceAll(`{${k}}`, v == null ? "" : String(v)), tpl || "");

const stuurWhatsApp = async (phone, text) => {
  const p = String(phone || "").replace(/\D/g, "");
  if (p) {
    const nr = p.startsWith("0") ? "31" + p.slice(1) : p;
    window.open(`https://wa.me/${nr}?text=${encodeURIComponent(text)}`, "_blank");
  } else {
    try { await navigator.clipboard.writeText(text); alert("Geen telefoonnummer bekend — bericht gekopieerd."); } catch (e) {}
  }
};

/* Pakketprijs: opgebouwd uit elementen, of vaste prijs (oude pakketten / overschreven prijs) */
const packageSum = (p, products) => {
  if (p.items && p.items.length)
    return p.items.reduce((t, it) => {
      const pr = (products || []).find((x) => x.id === it.productId);
      return t + (pr ? Number(pr.price || 0) * Number(it.qty || 1) : 0);
    }, 0);
  return Number(p.price) || 0;
};
const packageTotal = (p, products) =>
  p.priceOverride !== undefined && p.priceOverride !== null && p.priceOverride !== ""
    ? Number(p.priceOverride)
    : packageSum(p, products);

/* Wettelijke incassokosten-staffel (WIK), minimaal €40 */
const incassokosten = (bedrag) => {
  let k = 0, rest = bedrag;
  const staffel = [
    [2500, 0.15],
    [2500, 0.1],
    [5000, 0.05],
    [190000, 0.01],
    [Infinity, 0.005],
  ];
  for (const [max, pct] of staffel) {
    const deel = Math.min(rest, max);
    k += deel * pct;
    rest -= deel;
    if (rest <= 0) break;
  }
  return Math.min(Math.max(k, 40), 6775);
};

const toISO = (d) => {
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const fromISO = (s) => {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
};
const DAY_SHORT = ["ma", "di", "wo", "do", "vr", "za", "zo"];
const MONTHS = ["jan", "feb", "mrt", "apr", "mei", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
const niceDate = (iso) => {
  const d = fromISO(iso);
  return `${DAY_SHORT[(d.getDay() + 6) % 7]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
};
const mondayOf = (d) => {
  const x = new Date(d);
  const diff = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - diff);
  return x;
};
const catOf = (id) => CATEGORIES.find((c) => c.id === id) || CATEGORIES[0];

/* Beschikbaarheid instructeurs */
const dayIndex = (iso) => (fromISO(iso).getDay() + 6) % 7; // 0 = maandag
const isAbsent = (member, iso) =>
  (member.absences || []).find((a) => a.from && a.to && a.from <= iso && iso <= a.to) || null;
const worksOnDay = (member, iso) =>
  !member.schedule || !Array.isArray(member.schedule.days) || member.schedule.days.includes(dayIndex(iso));
const worksAtTime = (member, time) => {
  const s = member.schedule;
  if (!s || !s.start || !s.end) return true;
  return time >= s.start && time < s.end;
};
const endTime = (start, dur) => {
  const [h, m] = start.split(":").map(Number);
  const t = h * 60 + m + Number(dur || 60);
  return `${String(Math.floor(t / 60) % 24).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
};

function App() {
  const [session, setSession] = useState(undefined); // undefined = laden, null = uitgelogd
  const [lokaal, setLokaal] = useState(() => { try { return localStorage.getItem("rijplatform-lokaal") === "1"; } catch (e) { return false; } });
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("start");
  const [saveState, setSaveState] = useState("idle");
  const [printDoc, setPrintDoc] = useState(null);
  const loaded = useRef(false);
  const lastCloud = useRef({ c: {}, s: {} });
  const [reserveringen, setReserveringen] = useState([]);

  /* Lesaanvragen van leerlingen rechtstreeks uit de database (elke minuut ververst) */
  const laadReserveringen = async () => {
    if (lokaal || !supa || !session) return;
    const { data: rows } = await supa.from("reservations").select("*").eq("status", "open").order("created_at");
    setReserveringen(rows || []);
  };
  useEffect(() => {
    if (!session) return;
    laadReserveringen();
    const t = setInterval(laadReserveringen, 60000);
    return () => clearInterval(t);
  }, [session]);
  const dataRef = useRef(null);
  const syncTimer = useRef(null);
  dataRef.current = data;

  /* Sessie volgen */
  useEffect(() => {
    if (!supa) { setSession(null); return; }
    supa.auth.getSession().then((r) => setSession(r.data.session));
    const sub = supa.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => { try { sub.data.subscription.unsubscribe(); } catch (e) {} };
  }, []);

  /* Gegevens laden uit de cloud (met eenmalige migratie van lokale gegevens) */
  useEffect(() => {
    if (lokaal) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        setData(normalize(raw ? JSON.parse(raw) : null));
      } catch (e) {
        setData(normalize(null));
      }
      loaded.current = true;
      return;
    }
    if (!session) return;
    (async () => {
      try {
        const res = await supa.from("app_docs").select("collection,id,data").limit(5000);
        if (res.error) throw res.error;
        const rows = res.data || [];
        const d = {};
        const snapshot = { c: {}, s: {} };
        COLLECTIONS.forEach((c) => { d[c] = []; snapshot.c[c] = {}; });
        rows.forEach((r) => {
          if (r.collection === "singles") {
            d[r.id] = r.data;
            snapshot.s[r.id] = JSON.stringify(r.data);
          } else if (d[r.collection]) {
            d[r.collection].push(r.data);
            snapshot.c[r.collection][r.id] = JSON.stringify(r.data);
          }
        });
        lastCloud.current = snapshot;
        if (rows.length === 0) {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              setData(normalize(JSON.parse(raw))); // lokale gegevens worden zo naar de cloud gepusht
              loaded.current = true;
              return;
            }
          } catch (e) {}
        }
        setData(normalize(d));
        loaded.current = true;
      } catch (e) {
        setSaveState("error");
        alert("Kon de database niet laden: " + (e.message || e) + "\n\nControleer je internetverbinding en of het fase 1-script (app_docs) in Supabase is uitgevoerd.");
      }
    })();
  }, [session, lokaal]);

  /* Slim synchroniseren: alleen gewijzigde regels schrijven */
  const doSync = async () => {
    const d = dataRef.current;
    if (!d || !supa) return;
    try {
      setSaveState("saving");
      for (const c of COLLECTIONS) {
        const cur = {};
        (d[c] || []).forEach((it) => { if (it && it.id) cur[it.id] = JSON.stringify(it); });
        const prev = lastCloud.current.c[c] || {};
        const upserts = Object.keys(cur)
          .filter((id) => cur[id] !== prev[id])
          .map((id) => ({ collection: c, id, data: JSON.parse(cur[id]) }));
        const dels = Object.keys(prev).filter((id) => !(id in cur));
        if (upserts.length) { const r = await supa.from("app_docs").upsert(upserts); if (r.error) throw r.error; }
        if (dels.length) { const r = await supa.from("app_docs").delete().eq("collection", c).in("id", dels); if (r.error) throw r.error; }
        lastCloud.current.c[c] = cur;
      }
      for (const k of SINGLES) {
        const json = JSON.stringify(d[k] || {});
        if (json !== lastCloud.current.s[k]) {
          const r = await supa.from("app_docs").upsert({ collection: "singles", id: k, data: JSON.parse(json) });
          if (r.error) throw r.error;
          lastCloud.current.s[k] = json;
        }
      }
      setSaveState("saved");
      setTimeout(() => setSaveState("idle"), 1200);
    } catch (e) {
      setSaveState("error");
    }
  };

  useEffect(() => {
    if (!loaded.current || !data) return;
    if (lokaal) {
      try {
        setSaveState("saving");
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        setSaveState("saved");
        setTimeout(() => setSaveState("idle"), 1200);
      } catch (e) {
        setSaveState("error");
      }
      return;
    }
    if (!session) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(doSync, 800);
    return () => clearTimeout(syncTimer.current);
  }, [data, session, lokaal]);

  if (!lokaal && session === undefined)
    return (
      <div style={{ fontFamily: "system-ui", padding: 40, textAlign: "center", color: "#64748B" }}>
        Laden…
      </div>
    );

    ["facturen", "Facturen", "💶"],
    ["pakketten", "Pakketten", "📦"],

  return (
    <div
      style={{
        fontFamily: "'Space Grotesk', system-ui, sans-serif",
        background: "#EEF1F6",
        minHeight: "100vh",
        color: "#16283E",

        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
          outline: 2px solid #1D5FD1; outline-offset: 1px;
        }
