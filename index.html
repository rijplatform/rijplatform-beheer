            key={id}
            onClick={() => setTab(id)}
            style={{
              background: "none",
              border: "none",
              cursor: "pointer",
              padding: "6px 10px",
              borderRadius: 10,
              color: tab === id ? "#1D5FD1" : "#64748B",
              fontWeight: tab === id ? 700 : 500,
              fontSize: 12,
              fontFamily: "inherit",
            }}
          >
            <div style={{ fontSize: 20 }}>{icon}</div>
            {label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ================= DASHBOARD / START ================= */
function Dashboard({ data, update, goTab, reserveringen, laadReserveringen }) {
  const now = new Date();
  const today = toISO(now);
  const uur = now.getHours();
  const groet = uur < 12 ? "Goedemorgen" : uur < 18 ? "Goedemiddag" : "Goedenavond";
  const nowTime = `${String(uur).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;

  const student = (id) => data.students.find((s) => s.id === id);
  const productOf = (id) => (data.products || []).find((p) => p.id === id);

  /* Op dit moment */
  const lopend = data.lessons.filter(
    (l) => l.date === today && l.status !== "geannuleerd" && l.time <= nowTime && nowTime < endTime(l.time, l.dur)
  );

  /* Verjaardagen */
  const jarig = data.students.filter((s) => s.birthday && s.birthday.slice(5) === today.slice(5));

  /* Examens komende 14 dagen */
  const grens = (() => { const d = new Date(now); d.setDate(d.getDate() + 14); return toISO(d); })();
  const examens = data.lessons
    .filter((l) => {
      const pr = l.productId ? productOf(l.productId) : null;
      return pr && pr.group === "examen" && l.date >= today && l.date <= grens && l.status !== "geannuleerd";
    })
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time))
    .slice(0, 8);

  const dagLabel = (iso) => {
    const morgen = (() => { const d = new Date(now); d.setDate(d.getDate() + 1); return toISO(d); })();
    if (iso === today) return "Vandaag";
    if (iso === morgen) return "Morgen";
    return niceDate(iso);
  };

  /* Openstaand */
  const totalInv = (inv) => inv.lines.reduce((t, l) => t + Number(l.qty || 0) * Number(l.price || 0), 0);
  const openInvs = data.invoices.filter((i) => i.status === "open" && i.type !== "offerte");
  const openSum = openInvs.reduce((t, i) => t + totalInv(i), 0);

  /* Agenda delen */
  const deelAgenda = async (iso, label) => {
    const lessen = data.lessons
      .filter((l) => l.date === iso && l.status !== "geannuleerd")
      .sort((a, b) => a.time.localeCompare(b.time));
    let text = `Agenda ${label} (${niceDate(iso)}) — ${data.settings.company.name}\n`;
    if (!lessen.length) text += "Geen lessen gepland.";
    else
      lessen.forEach((l) => {
        const s = student(l.studentId);
        const pr = l.productId ? productOf(l.productId) : null;
        text += `\n${l.time}–${endTime(l.time, l.dur)} · ${s ? s.name : "?"}${pr ? ` · ${pr.name}` : ""}${l.location ? ` · ${l.location}` : ""}`;
      });
    try {
      if (navigator.share) await navigator.share({ title: `Agenda ${label}`, text });
      else { await navigator.clipboard.writeText(text); alert("Agenda gekopieerd — plak hem in WhatsApp of e-mail."); }
    } catch (e) { /* geannuleerd */ }
  };

  /* Taken */
  const [taakTekst, setTaakTekst] = useState("");
  const addTaak = () => {
    if (!taakTekst.trim()) return;
    update((d) => { d.tasks.push({ id: uid(), text: taakTekst.trim(), done: false }); return d; });
    setTaakTekst("");
  };

  /* Notities per dag */
  const [noteDate, setNoteDate] = useState(today);
  const shiftNote = (n) => { const d = fromISO(noteDate); d.setDate(d.getDate() + n); setNoteDate(toISO(d)); };

  const kaart = { background: "#fff", borderRadius: 14, padding: 14, marginBottom: 12 };
  const kop = { fontWeight: 700, fontSize: 13, letterSpacing: 0.8, textTransform: "uppercase", color: "#475569", marginBottom: 10 };

  return (
    <div>
      {/* Begroeting */}
      <div style={{ background: "#16283E", color: "#fff", borderRadius: 16, padding: "18px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 21, fontWeight: 700 }}>{groet}! 👋</div>
        <div style={{ fontSize: 13, color: "#9FB3CC", marginTop: 2 }}>{data.settings.company.name} · {niceDate(today)}</div>
      </div>

      {/* Verjaardagen */}
      {jarig.map((s) => {
        const leeftijd = now.getFullYear() - Number(s.birthday.slice(0, 4));
        return (
          <div key={s.id} style={{ background: "#FFF7E6", border: "1px solid #F7B32B", borderRadius: 12, padding: "10px 14px", marginBottom: 8, fontSize: 14 }}>
            🎁 <b>{s.name}</b> is vandaag <b>{leeftijd} jaar</b> geworden!
          </div>
        );
      })}

      {/* Op dit moment */}
      <div style={kaart}>
        <div style={kop}>Op dit moment</div>
        {lopend.length === 0 && <div style={{ fontSize: 14, color: "#94A3B8" }}>Geen les bezig.</div>}
        {lopend.map((l) => {
          const s = student(l.studentId);
          const pr = l.productId ? productOf(l.productId) : null;
          return (
            <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <span style={{ width: 10, height: 10, borderRadius: 99, background: "#16A34A", flexShrink: 0 }} />
              <div>
                <b>{l.time}–{endTime(l.time, l.dur)}</b> · {s ? s.name : "?"}
                {pr && <Chip color={pr.color || GROUP_COLORS[pr.group] || "#1D5FD1"}> {pr.name}</Chip>}
              </div>
            </div>
          );
        })}
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          <Btn kind="ghost" small onClick={() => deelAgenda(today, "vandaag")}>📄 Agenda vandaag</Btn>
          <Btn kind="ghost" small onClick={() => { const d = new Date(now); d.setDate(d.getDate() + 1); deelAgenda(toISO(d), "morgen"); }}>📄 Morgen</Btn>
          <Btn kind="accent" small onClick={() => goTab("agenda")}>Naar agenda →</Btn>
        </div>
      </div>

      {/* Herinneringen voor morgen */}
      <div style={kaart}>
        <div style={kop}>Afspraakherinneringen voor morgen</div>
        {(() => {
          const morgen = (() => { const d = new Date(now); d.setDate(d.getDate() + 1); return toISO(d); })();
          const morgenLessen = data.lessons
            .filter((l) => l.date === morgen && l.status === "gepland")
            .sort((a, b) => a.time.localeCompare(b.time));
          if (morgenLessen.length === 0)
            return <div style={{ fontSize: 14, color: "#94A3B8" }}>Geen lessen morgen.</div>;
          return morgenLessen.map((l) => {
            const s = student(l.studentId);
            return (
              <div key={l.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderTop: "1px solid #EDF1F6", fontSize: 14, gap: 8 }}>
                <span><b>{l.time}</b> · {s ? s.name : "?"}</span>
                <Btn
                  kind="ghost"
                  small
                  onClick={() => {
                    if (!s) return;
                    const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES).herinnering, {
                      naam: s.name.split(" ")[0],
                      rijschool: data.settings.company.name,
                      datum: niceDate(l.date),
                      tijd: l.time,
                      eindtijd: endTime(l.time, l.dur),
                      locatie: l.location ? ` Ophaallocatie: ${l.location}.` : "",
                    });
                    stuurWhatsApp(s.phone, text);
                  }}
                >
                  💬 Herinnering
                </Btn>
              </div>
            );
          });
        })()}
      </div>

      {/* Reserveringen (komen automatisch binnen uit de database) */}
      <div style={kaart}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ ...kop, marginBottom: 0 }}>Reserveringen {reserveringen.length > 0 && `(${reserveringen.length})`}</div>
          <Btn kind="ghost" small onClick={laadReserveringen}>🔄 Vernieuwen</Btn>
        </div>
        {reserveringen.length === 0 && (
          <div style={{ fontSize: 14, color: "#94A3B8" }}>
            Geen openstaande aanvragen. Nieuwe lesaanvragen van leerlingen verschijnen hier vanzelf.
          </div>
        )}
        {reserveringen.map((r) => {
          const digits = (x) => String(x || "").replace(/\D/g, "");
          const isAnnulering = r.lestype === "ANNULERING";
          const annuleerLes = async () => {
            let s = data.students.find((st) => digits(st.phone) && digits(r.tel) && digits(st.phone).slice(-8) === digits(r.tel).slice(-8));
            if (!s) s = data.students.find((st) => st.name.toLowerCase() === String(r.naam || "").toLowerCase());
            const les = data.lessons.find(
              (l) => l.date === r.datum && l.status === "gepland" &&
                ((s && l.studentId === s.id) || (!s && false)) &&
                (!r.tijdvoorkeur || l.time === r.tijdvoorkeur)
            );
            if (!les) return alert(`Geen geplande les gevonden op ${niceDate(r.datum)}${r.tijdvoorkeur ? ` om ${r.tijdvoorkeur}` : ""} voor ${r.naam}. Controleer de agenda en annuleer daar handmatig, of wijs dit verzoek af.`);
            const cancelUren = Number((data.settings.booking || {}).cancelUren) || 24;
            const urenTot = (new Date(`${les.date}T${les.time}:00`) - new Date()) / 3600000;
            if (urenTot < cancelUren && !window.confirm(`⚠️ Deze les is binnen de annuleringstermijn van ${cancelUren} uur. Toch annuleren?`)) return;
            update((d) => { const l = d.lessons.find((x) => x.id === les.id); if (l) l.status = "geannuleerd"; return d; });
            try { await supa.from("reservations").update({ status: "bevestigd", student_id: s ? s.id : null }).eq("id", r.id); } catch (e) {}
            laadReserveringen();
            if (data.settings.autoMail && s && s.email) {
              const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES).annulering, {
                naam: s.name.split(" ")[0],
                rijschool: data.settings.company.name,
                datum: niceDate(les.date),
                tijd: les.time,
                eindtijd: endTime(les.time, les.dur),
                locatie: "",
              });
              mailAuto(s.email, `Rijles geannuleerd — ${data.settings.company.name}`, text, data.settings.company.name)
                .catch((e) => alert("Annuleringsmail niet verstuurd: " + e.message));
            }
            alert(`✓ Les van ${niceDate(les.date)} om ${les.time} is geannuleerd.`);
          };
          const bevestig = async () => {
            let s = data.students.find((st) => digits(st.phone) && digits(r.tel) && digits(st.phone).slice(-8) === digits(r.tel).slice(-8));
            if (!s) s = data.students.find((st) => st.name.toLowerCase() === String(r.naam || "").toLowerCase());
            if (!s) return alert(`Leerling "${r.naam}" niet gevonden op telefoonnummer of naam. Voeg de leerling eerst toe (tab Leerlingen) en bevestig daarna.`);
            const sugg = String(r.tijdvoorkeur || "").startsWith("Middag") ? "13:00" : String(r.tijdvoorkeur || "").startsWith("Avond") ? "17:00" : "09:00";
            const tijd = window.prompt(`Hoe laat wordt de les op ${niceDate(r.datum)}? (voorkeur: ${r.tijdvoorkeur || "—"})`, sugg);
            if (!tijd) return;
            const vaste = (data.team || []).find((t) => t.name === r.instructeur);
            const les = {
              id: uid(),
              studentId: s.id,
              date: r.datum,
              time: tijd,
              dur: (data.settings.agenda || {}).defaultDur || 60,
              location: r.locatie === "Thuisadres" && s.address ? `${s.address}${s.zipcity ? ", " + s.zipcity : ""}` : r.locatie || "",
              note: r.opmerking ? `Aanvraag: ${r.opmerking}` : "",
              status: "gepland",
              teamId: vaste ? vaste.id : s.vasteTeamId || "",
            };
            update((d) => { d.lessons.push(les); return d; });
            try {
              await supa.from("reservations").update({ status: "bevestigd", student_id: s.id }).eq("id", r.id);
            } catch (e) {}
            laadReserveringen();
            if (data.settings.autoMail && s.email) {
              const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES).bevestiging, {
                naam: s.name.split(" ")[0],
                rijschool: data.settings.company.name,
                datum: niceDate(les.date),
                tijd: les.time,
                eindtijd: endTime(les.time, les.dur),
                locatie: les.location ? ` Ophaallocatie: ${les.location}.` : "",
              });
              mailAuto(s.email, `Bevestiging rijles — ${data.settings.company.name}`, text, data.settings.company.name)
                .catch((e) => alert("Bevestigingsmail niet verstuurd: " + e.message));
            }
            alert(`✓ Les ingepland: ${niceDate(les.date)} om ${tijd} voor ${s.name}.`);
          };
          const wijsAf = async () => {
            if (!window.confirm(`Aanvraag van ${r.naam} afwijzen?`)) return;
            try { await supa.from("reservations").update({ status: "afgewezen" }).eq("id", r.id); } catch (e) {}
            laadReserveringen();
            if (r.tel && window.confirm("De leerling via WhatsApp laten weten dat dit moment niet past?")) {
              stuurWhatsApp(r.tel, `Hoi ${String(r.naam).split(" ")[0]}, helaas past ${niceDate(r.datum)} (${r.tijdvoorkeur || ""}) niet in de planning. Stuur gerust een paar alternatieve momenten door, dan plannen we snel iets in! Groeten, ${data.settings.company.name}`);
            }
          };
          if (isAnnulering)
            return (
              <div key={r.id} style={{ borderTop: "1px solid #EDF1F6", padding: "10px 0" }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#DC2626" }}>❌ {r.naam} <span style={{ fontWeight: 400 }}>wil annuleren</span></div>
                <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>
                  Les van {niceDate(r.datum)}{r.tijdvoorkeur && ` om ${r.tijdvoorkeur}`}
                </div>
                {r.opmerking && <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>„{r.opmerking}"</div>}
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <Btn kind="danger" small onClick={annuleerLes}>✔ Les annuleren</Btn>
                  <Btn kind="ghost" small onClick={wijsAf}>✕ Afwijzen</Btn>
                </div>
              </div>
            );
          return (
            <div key={r.id} style={{ borderTop: "1px solid #EDF1F6", padding: "10px 0" }}>
              <div style={{ fontWeight: 700, fontSize: 14 }}>{r.naam} <span style={{ fontWeight: 400, color: "#64748B" }}>· {r.lestype || "rijles"}</span></div>
              <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>
                {niceDate(r.datum)} · {r.tijdvoorkeur || "geen tijdvoorkeur"} · 📍 {r.locatie || "—"}
                {r.instructeur && <span> · 🧑‍🏫 {r.instructeur}</span>}
              </div>
              {r.opmerking && <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>„{r.opmerking}"</div>}
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <Btn kind="ok" small onClick={bevestig}>✔ Bevestigen</Btn>
                <Btn kind="ghost" small onClick={wijsAf}>✕ Afwijzen</Btn>
              </div>
            </div>
          );
        })}
      </div>

      {/* Examens en toetsen */}
      <div style={kaart}>
        <div style={kop}>Examens en toetsen</div>
        <div style={{ fontSize: 12, color: "#94A3B8", marginBottom: 8 }}>Aankomende 14 dagen</div>
        {examens.length === 0 && (
          <div style={{ fontSize: 14, color: "#94A3B8" }}>
            Geen examens gepland. Kies bij een les het lestype (bijv. Praktijkexamen) en hij verschijnt hier.
          </div>
        )}
        {examens.map((l) => {
          const s = student(l.studentId);
          const pr = productOf(l.productId);
          return (
            <div key={l.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: "1px solid #EDF1F6", gap: 8 }}>
              <div>
                <div style={{ fontSize: 12, color: "#64748B" }}>{dagLabel(l.date)}, {l.time} uur</div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{s ? s.name : "?"}</div>
                {pr && <span style={{ fontSize: 12, fontWeight: 700, color: pr.color || GROUP_COLORS.examen }}>{pr.name}</span>}
              </div>
              <Chip color={l.status === "afgerond" ? "#16A34A" : "#64748B"}>{l.status === "afgerond" ? "Afgerond" : "Gepland"}</Chip>
            </div>
          );
        })}
      </div>

      {/* Openstaand */}
      <div style={{ ...kaart, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={kop}>Openstaand</div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>{euro(openSum)}</div>
          <div style={{ fontSize: 12, color: "#64748B" }}>{openInvs.length} open {openInvs.length === 1 ? "factuur" : "facturen"}</div>
        </div>
        <Btn kind="ghost" small onClick={() => goTab("facturen")}>Bekijk →</Btn>
      </div>

      {/* Taken */}
      <div style={kaart}>
        <div style={kop}>Taken</div>
        {(data.tasks || []).length === 0 && <div style={{ fontSize: 14, color: "#94A3B8", marginBottom: 8 }}>Geen taken.</div>}
        {(data.tasks || []).map((t) => (
          <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", borderBottom: "1px solid #EDF1F6" }}>
            <input
              type="checkbox"
              checked={t.done}
              onChange={() => update((d) => { const x = d.tasks.find((y) => y.id === t.id); x.done = !x.done; return d; })}
              style={{ width: 18, height: 18, flexShrink: 0 }}
            />
            <span style={{ flex: 1, fontSize: 14, textDecoration: t.done ? "line-through" : "none", color: t.done ? "#94A3B8" : "#16283E" }}>{t.text}</span>
            <button
              onClick={() => update((d) => ({ ...d, tasks: d.tasks.filter((y) => y.id !== t.id) }))}
              style={{ background: "none", border: "none", color: "#94A3B8", cursor: "pointer", fontSize: 15 }}
            >✕</button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
          <input
            style={{ ...inputStyle, flex: 1 }}
            placeholder="Nieuwe taak…"
            value={taakTekst}
            onChange={(e) => setTaakTekst(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") addTaak(); }}
          />
          <Btn kind="accent" small onClick={addTaak}>+</Btn>
        </div>
      </div>

      {/* Notities per dag */}
      <div style={kaart}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ ...kop, marginBottom: 0 }}>Notities</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Btn kind="ghost" small onClick={() => shiftNote(-1)}>‹</Btn>
            <span style={{ fontSize: 13, fontWeight: 700 }}>{niceDate(noteDate)}</span>
            <Btn kind="ghost" small onClick={() => shiftNote(1)}>›</Btn>
          </div>
        </div>
        <textarea
          style={{ ...inputStyle, minHeight: 80 }}
          placeholder="Notities voor deze dag…"
          value={(data.dayNotes || {})[noteDate] || ""}
          onChange={(e) => update((d) => { if (!d.dayNotes) d.dayNotes = {}; d.dayNotes[noteDate] = e.target.value; return d; })}
        />
      </div>
    </div>
  );
}

/* ================= AGENDA ================= */
function Agenda({ data, update }) {
  const [selected, setSelected] = useState(toISO(new Date()));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(null);
  const [wide, setWide] = useState(typeof window !== "undefined" && window.innerWidth >= 900);
  const [wideMode, setWideMode] = useState("week"); // "week" of "dag"
  const [nu, setNu] = useState(new Date());

  useEffect(() => {
    const onResize = () => setWide(window.innerWidth >= 900);
    window.addEventListener("resize", onResize);
    const tik = setInterval(() => setNu(new Date()), 60000);
    return () => { window.removeEventListener("resize", onResize); clearInterval(tik); };
  }, []);

  /* Tijdraster-instellingen */
  const START_MIN = 6 * 60;   // 06:00
  const END_MIN = 22 * 60;    // 22:00
  const PPM = 1.1;            // pixels per minuut
  const gridH = (END_MIN - START_MIN) * PPM;
  const toMin = (t) => { const [h, m] = String(t).split(":").map(Number); return h * 60 + (m || 0); };

  /* Overlappende lessen naast elkaar zetten (banen) */
  const laneLayout = (lessen) => {
    const lanes = [];
    const laneOf = {};
    lessen.forEach((l) => {
      const s = toMin(l.time);
      const e = s + Number(l.dur || 60);
      let li = lanes.findIndex((eind) => eind <= s);
      if (li === -1) { li = lanes.length; lanes.push(e); } else lanes[li] = e;
      laneOf[l.id] = li;
    });
    return { laneOf, laneCount: Math.max(1, lanes.length) };
  };

  const shiftDay = (n) => {
    const d = fromISO(selected);
    d.setDate(d.getDate() + n);
    setSelected(toISO(d));
  };

  const monday = mondayOf(fromISO(selected));
  const week = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return toISO(d);
  });

  const shiftWeek = (n) => {
    const d = fromISO(selected);
    d.setDate(d.getDate() + n * 7);
    setSelected(toISO(d));
  };

  const student = (id) => data.students.find((s) => s.id === id);
  const productOf = (id) => (data.products || []).find((p) => p.id === id);
  const lesColorOf = (l) => {
    const s = student(l.studentId);
    const pr = l.productId ? productOf(l.productId) : null;
    return pr ? pr.color || GROUP_COLORS[pr.group] || catOf(s?.category).color : catOf(s?.category).color;
  };

  const lessonsOn = (iso) =>
    data.lessons.filter((l) => l.date === iso).sort((a, b) => a.time.localeCompare(b.time));

  const absentiesOp = (iso) =>
    (data.team || [])
      .filter((t) => t.role === "instructeur")
      .map((t) => ({ t, abs: isAbsent(t, iso), vrij: !worksOnDay(t, iso) }))
      .filter((x) => x.abs || x.vrij);

  const openNew = (iso, tijd) => {
    const ag = (data.settings && data.settings.agenda) || {};
    setForm({
      id: null,
      studentId: data.students[0]?.id || "",
      date: iso || selected,
      time: tijd || ag.defaultTime || "09:00",
      dur: ag.defaultDur || 60,
      location: "",
      note: "",
      status: "gepland",
    });
    setShowForm(true);
  };

  const autoLesMail = (soort, les) => {
    if (!data.settings.autoMail) return;
    const s = student(les.studentId);
    if (!s || !s.email) return;
    const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES)[soort] || "", {
      naam: s.name.split(" ")[0],
      rijschool: data.settings.company.name,
      datum: niceDate(les.date),
      tijd: les.time,
      eindtijd: endTime(les.time, les.dur),
      locatie: les.location ? ` Ophaallocatie: ${les.location}.` : "",
    });
    mailAuto(s.email, `${MAIL_ONDERWERPEN[soort]} — ${data.settings.company.name}`, text, data.settings.company.name)
      .catch((e) => alert("Automatische mail niet verstuurd: " + e.message));
  };

  const saveLesson = () => {
    if (!form.studentId) return alert("Kies eerst een leerling (tab Leerlingen om er één toe te voegen).");
    if (form.teamId) {
      const t = (data.team || []).find((x) => x.id === form.teamId);
      if (t) {
        const abs = isAbsent(t, form.date);
        const reden = abs
          ? `is afwezig${abs.reason ? ` (${abs.reason})` : ""} van ${niceDate(abs.from)} t/m ${niceDate(abs.to)}`
          : !worksOnDay(t, form.date)
          ? "werkt normaal niet op deze dag"
          : !worksAtTime(t, form.time)
          ? `werkt normaal van ${t.schedule.start} tot ${t.schedule.end}`
          : null;
        if (reden && !window.confirm(`⚠️ Let op: ${t.name} ${reden}.\n\nToch inplannen?`)) return;
      }
    }
    const oud = form.id ? data.lessons.find((l) => l.id === form.id) : null;
    update((d) => {
      if (form.id) {
        const i = d.lessons.findIndex((l) => l.id === form.id);
        d.lessons[i] = form;
      } else {
        d.lessons.push({ ...form, id: uid() });
      }
      return d;
    });
    setShowForm(false);
    if (!form.id) autoLesMail("bevestiging", form);
    else if (oud && oud.status !== "geannuleerd" && form.status === "geannuleerd") autoLesMail("annulering", form);
    else if (oud && (oud.date !== form.date || oud.time !== form.time || String(oud.dur) !== String(form.dur))) autoLesMail("wijziging", form);
  };

  const setStatus = (id, status) => {
    const oud = data.lessons.find((x) => x.id === id);
    const wordtGeannuleerd = oud && status === "geannuleerd" && oud.status !== "geannuleerd";
    update((d) => {
      const l = d.lessons.find((x) => x.id === id);
      if (l) l.status = l.status === status ? "gepland" : status;
      return d;
    });
    if (wordtGeannuleerd) autoLesMail("annulering", oud);
  };

  const removeLesson = (id) => {
    if (!window.confirm("Deze les verwijderen?")) return;
    update((d) => ({ ...d, lessons: d.lessons.filter((l) => l.id !== id) }));
  };

  const lesBericht = (l, soort, kanaal) => {
    const s = student(l.studentId);
    if (!s) return alert("Geen leerling gekoppeld aan deze les.");
    const tpl = (data.settings.messages || DEFAULT_MSG_TEMPLATES)[soort] || "";
    const text = vulSjabloon(tpl, {
      naam: s.name.split(" ")[0],
      rijschool: data.settings.company.name,
      datum: niceDate(l.date),
      tijd: l.time,
      eindtijd: endTime(l.time, l.dur),
      locatie: l.location ? ` Ophaallocatie: ${l.location}.` : "",
    });
    if (kanaal === "mail") {
      if (!s.email) return alert("Geen e-mailadres bekend bij deze leerling.");
      const onderwerp =
        soort === "annulering" ? "Rijles geannuleerd" :
        soort === "herinnering" ? "Herinnering: rijles morgen" :
        soort === "wijziging" ? "Rijles gewijzigd" : "Bevestiging rijles";
      window.location.href = `mailto:${s.email}?subject=${encodeURIComponent(onderwerp + " — " + data.settings.company.name)}&body=${encodeURIComponent(text)}`;
    } else {
      stuurWhatsApp(s.phone, text);
    }
  };

  const dayLessons = lessonsOn(selected);
  const today = toISO(new Date());

  /* ---------- gedeeld lesformulier ---------- */
  const lesFormulier = showForm && (
    <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginTop: 12, border: "1px solid #E2E8F0", maxWidth: 720 }}>
      <div style={{ fontWeight: 700, marginBottom: 10 }}>{form.id ? "Les bewerken" : "Nieuwe les"}</div>
      <Field label="Leerling">
        <select style={inputStyle} value={form.studentId} onChange={(e) => setForm({ ...form, studentId: e.target.value })}>
          <option value="">— kies leerling —</option>
          {data.students.map((s) => (
            <option key={s.id} value={s.id}>{s.name}</option>
          ))}
        </select>
      </Field>
      <div style={{ display: "flex", gap: 8 }}>
        <div style={{ flex: 1.4 }}>
          <Field label="Datum">
            <input type="date" style={inputStyle} value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
          </Field>
        </div>
        <div style={{ flex: 1 }}>
          <Field label="Tijd">
            <input type="time" style={inputStyle} value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} />
          </Field>
        </div>
        <div style={{ flex: 0.8 }}>
          <Field label="Duur (min)">
            <input type="number" style={inputStyle} value={form.dur} onChange={(e) => setForm({ ...form, dur: e.target.value })} />
          </Field>
        </div>
      </div>
      <Field label="Ophaallocatie">
        <input style={inputStyle} list="ophaallocaties" value={form.location} placeholder="bijv. thuis, station Zuid" onChange={(e) => setForm({ ...form, location: e.target.value })} />
        <datalist id="ophaallocaties">
          {regels((data.settings.booking || {}).locaties).map((l) => (
            <option key={l} value={l} />
          ))}
        </datalist>
      </Field>
      {(data.products || []).length > 0 && (
        <Field label="Lestype (bepaalt de kleur in de agenda)">
          <select style={inputStyle} value={form.productId || ""} onChange={(e) => setForm({ ...form, productId: e.target.value })}>
            <option value="">— standaard rijles —</option>
            {PRODUCT_GROUPS.map(([gid, glabel]) => {
              const stu = data.students.find((x) => x.id === form.studentId);
              const items = (data.products || []).filter(
                (p) => (p.group || "overig") === gid && gid !== "overig" && (!stu || (p.cat || "schakel") === stu.category)
              );
              return items.length ? (
                <optgroup key={gid} label={glabel}>
                  {items.map((p) => (
                    <option key={p.id} value={p.id}>{p.name}</option>
                  ))}
                </optgroup>
              ) : null;
            })}
          </select>
        </Field>
      )}
      {(data.vehicles || []).length > 0 && (
        <Field label="Voertuig">
          <select style={inputStyle} value={form.vehicleId || ""} onChange={(e) => setForm({ ...form, vehicleId: e.target.value })}>
            <option value="">— geen —</option>
            {data.vehicles.map((v) => (
              <option key={v.id} value={v.id}>{v.name}{v.plate ? ` · ${v.plate}` : ""}</option>
            ))}
          </select>
        </Field>
      )}
      {(data.team || []).filter((t) => t.role === "instructeur").length > 0 && (
        <Field label="Instructeur">
          <select style={inputStyle} value={form.teamId || ""} onChange={(e) => setForm({ ...form, teamId: e.target.value })}>
            <option value="">— geen —</option>
            {data.team.filter((t) => t.role === "instructeur").map((t) => (
              <option key={t.id} value={t.id}>{t.name}</option>
            ))}
          </select>
        </Field>
      )}
      <Field label="Notitie">
        <input style={inputStyle} value={form.note} placeholder="bijv. focus op parkeren" onChange={(e) => setForm({ ...form, note: e.target.value })} />
      </Field>
      {form.id && (
        <Field label="Status">
          <select style={inputStyle} value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
            <option value="gepland">Gepland</option>
            <option value="afgerond">✓ Afgerond</option>
            <option value="geannuleerd">✕ Geannuleerd</option>
          </select>
        </Field>
      )}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <Btn onClick={saveLesson} style={{ flex: 1 }}>Opslaan</Btn>
        <Btn kind="ghost" onClick={() => setShowForm(false)}>Annuleren</Btn>
        {form.id && (
          <Btn kind="ghost" onClick={() => lesBericht(form, form.status === "geannuleerd" ? "annulering" : "bevestiging")}>
            💬 {form.status === "geannuleerd" ? "Annulering sturen" : "Bevestiging sturen"}
          </Btn>
        )}
        {form.id && (
          <Btn kind="ghost" onClick={() => lesBericht(form, form.status === "geannuleerd" ? "annulering" : "bevestiging", "mail")}>
            ✉️ Per e-mail
          </Btn>
        )}
        {form.id && (
          <Btn kind="danger" onClick={() => { setShowForm(false); removeLesson(form.id); }}>🗑</Btn>
        )}
      </div>
    </div>
  );

  /* ================= BREED SCHERM: TIJDRASTER (PlanGo-stijl) ================= */
  if (wide) {
    const zichtDagen = wideMode === "week" ? week : [selected];
    const kolomBreed = wideMode === "week" ? "repeat(7, 1fr)" : "1fr";
    const uren = [];
    for (let m = START_MIN; m <= END_MIN; m += 60) uren.push(m);
    const nuMin = nu.getHours() * 60 + nu.getMinutes();
    const nuTijd = `${String(nu.getHours()).padStart(2, "0")}:${String(nu.getMinutes()).padStart(2, "0")}`;

    const kolomKlik = (iso) => (e) => {
      if (e.target !== e.currentTarget) return; // alleen lege ruimte
      const y = e.nativeEvent.offsetY;
      let mins = START_MIN + y / PPM;
      mins = Math.max(START_MIN, Math.min(END_MIN - 15, Math.round(mins / 15) * 15));
      const t = `${String(Math.floor(mins / 60)).padStart(2, "0")}:${String(mins % 60).padStart(2, "0")}`;
      setSelected(iso);
      openNew(iso, t);
    };

    return (
      <div>
        {/* Bovenbalk */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Btn kind="ghost" small onClick={() => (wideMode === "week" ? shiftWeek(-1) : shiftDay(-1))}>‹</Btn>
            <div style={{ fontWeight: 700, fontSize: 16, minWidth: 200, textAlign: "center" }}>
              {wideMode === "week" ? `${niceDate(week[0])} t/m ${niceDate(week[6])}` : niceDate(selected)}
            </div>
            <Btn kind="ghost" small onClick={() => (wideMode === "week" ? shiftWeek(1) : shiftDay(1))}>›</Btn>
            <Btn kind={selected === today ? "primary" : "ghost"} small onClick={() => setSelected(today)}>Vandaag</Btn>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ display: "flex", background: "#fff", borderRadius: 10, padding: 3 }}>
              {[["dag", "Dag"], ["week", "Week"]].map(([id, label]) => (
                <button
                  key={id}
                  onClick={() => setWideMode(id)}
                  style={{
                    border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 13,
                    borderRadius: 8, padding: "7px 16px",
                    background: wideMode === id ? "#16283E" : "transparent",
                    color: wideMode === id ? "#fff" : "#64748B",
                  }}
                >{label}</button>
              ))}
            </div>
            <Btn kind="accent" small onClick={() => openNew(selected)}>+ Les inplannen</Btn>
          </div>
        </div>

        {/* Dagkoppen */}
        <div style={{ display: "grid", gridTemplateColumns: `56px ${kolomBreed}`, gap: 0, marginBottom: 2 }}>
          <div />
          {zichtDagen.map((iso) => {
            const d = fromISO(iso);
            const isToday = iso === today;
            const afwezig = absentiesOp(iso);
            return (
              <button
                key={iso}
                onClick={() => { setSelected(iso); if (wideMode === "week") setWideMode("dag"); }}
                title="Klik voor dagweergave"
                style={{
                  border: "none", cursor: "pointer", fontFamily: "inherit", background: "transparent",
                  padding: "6px 4px", textAlign: "center",
                  color: isToday ? "#E4572E" : "#334155", fontWeight: 700, fontSize: 13,
                }}
              >
                {DAY_SHORT[(d.getDay() + 6) % 7]} {d.getDate()}
                {afwezig.length > 0 && <span title={afwezig.map((x) => x.t.name).join(", ")}> 🏖</span>}
              </button>
            );
          })}
        </div>

        {/* Tijdraster */}
        <div style={{ background: "#fff", borderRadius: 12, overflow: "auto", maxHeight: "72vh", border: "1px solid #E2E8F0" }}>
          <div style={{ display: "grid", gridTemplateColumns: `56px ${kolomBreed}`, position: "relative" }}>
            {/* Urenkolom */}
            <div style={{ position: "relative", height: gridH, borderRight: "1px solid #EDF1F6" }}>
              {uren.map((m) => (
                <div key={m} style={{ position: "absolute", top: (m - START_MIN) * PPM - 7, right: 6, fontSize: 11, color: "#94A3B8" }}>
                  {String(m / 60).padStart(2, "0")}:00
                </div>
              ))}
            </div>

            {/* Dagkolommen */}
            {zichtDagen.map((iso) => {
              const lessen = lessonsOn(iso);
              const { laneOf, laneCount } = laneLayout(lessen);
              const isToday = iso === today;
              return (
                <div
                  key={iso}
                  onClick={kolomKlik(iso)}
                  title="Klik op een leeg tijdstip om in te plannen"
                  style={{
                    position: "relative", height: gridH, cursor: "copy",
                    borderRight: "1px solid #EDF1F6",
                    background: isToday ? "#1D5FD108" : "transparent",
                  }}
                >
                  {/* uurlijnen */}
                  {uren.map((m) => (
                    <div key={m} style={{ position: "absolute", left: 0, right: 0, top: (m - START_MIN) * PPM, borderTop: "1px solid #EDF1F6", pointerEvents: "none" }} />
                  ))}

                  {/* lesblokken */}
                  {lessen.map((l) => {
                    const s = student(l.studentId);
                    const pr = l.productId ? productOf(l.productId) : null;
                    const kleur = lesColorOf(l);
                    const cancelled = l.status === "geannuleerd";
                    const done = l.status === "afgerond";
                    const startM = Math.max(toMin(l.time), START_MIN);
                    const dur = Number(l.dur || 60);
                    const top = (startM - START_MIN) * PPM;
                    const hoogte = Math.max(24, dur * PPM - 2);
                    const lane = laneOf[l.id] || 0;
                    const breed = 100 / laneCount;
                    return (
                      <button
                        key={l.id}
                        onClick={(e) => { e.stopPropagation(); setForm({ ...l }); setShowForm(true); }}
                        title={`${l.time}–${endTime(l.time, l.dur)} · ${s ? s.name : "?"}${pr ? ` · ${pr.name}` : ""}`}
                        style={{
                          position: "absolute",
                          top, height: hoogte,
                          left: `calc(${lane * breed}% + 2px)`,
                          width: `calc(${breed}% - 4px)`,
                          textAlign: "left", border: "none", cursor: "pointer", fontFamily: "inherit",
                          background: cancelled ? "#F1F5F9" : kleur + "2E",
                          borderLeft: `4px solid ${cancelled ? "#CBD5E1" : kleur}`,
                          borderRadius: 7, padding: "3px 6px", overflow: "hidden",
                          opacity: cancelled ? 0.6 : 1,
                          boxShadow: "0 1px 2px rgba(22,40,62,.08)",
                        }}
                      >
                        <div style={{ fontSize: 11, fontWeight: 700, textDecoration: cancelled ? "line-through" : "none", whiteSpace: "nowrap" }}>
                          {l.time}–{endTime(l.time, l.dur)} {done && "✓"}
                        </div>
                        <div style={{ fontSize: 12, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {s ? s.name : "?"}
                        </div>
                        {hoogte > 44 && pr && (
                          <div style={{ fontSize: 10.5, fontWeight: 700, color: kleur, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {pr.name}
                          </div>
                        )}
                        {hoogte > 60 && l.location && (
                          <div style={{ fontSize: 10.5, color: "#64748B", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            📍 {l.location}
                          </div>
                        )}
                      </button>
                    );
                  })}

                  {/* nu-lijn */}
                  {isToday && nuMin >= START_MIN && nuMin <= END_MIN && (
                    <div style={{ position: "absolute", left: 0, right: 0, top: (nuMin - START_MIN) * PPM, pointerEvents: "none", zIndex: 5 }}>
                      <div style={{ borderTop: "2px solid #E4572E", position: "relative" }}>
                        <span style={{ position: "absolute", left: -4, top: -5, width: 8, height: 8, borderRadius: 99, background: "#E4572E" }} />
                        <span style={{ position: "absolute", right: 4, top: -16, fontSize: 10, fontWeight: 700, color: "#E4572E" }}>{nuTijd}</span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 8 }}>
          Klik op een leeg tijdstip om daar in te plannen · klik op een les om te bewerken · klik op een dagkop voor dagweergave.
        </div>

        {lesFormulier}
      </div>
    );
  }

  /* ================= SMAL SCHERM: DAGWEERGAVE ================= */
  return (
    <div>
      {/* Weekstrip */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
        <Btn kind="ghost" small onClick={() => shiftWeek(-1)}>‹</Btn>
        <div style={{ flex: 1, display: "flex", gap: 4 }}>
          {week.map((iso) => {
            const d = fromISO(iso);
            const count = data.lessons.filter((l) => l.date === iso && l.status !== "geannuleerd").length;
            const active = iso === selected;
            const isToday = iso === today;
            return (
              <button
                key={iso}
                onClick={() => setSelected(iso)}
                style={{
                  flex: 1,
                  border: "none",
                  cursor: "pointer",
                  borderRadius: 12,
                  padding: "8px 0 6px",
                  background: active ? "#16283E" : "#fff",
                  color: active ? "#fff" : isToday ? "#1D5FD1" : "#334155",
                  fontFamily: "inherit",
                }}
              >
                <div style={{ fontSize: 10, fontWeight: 600, opacity: 0.8 }}>{DAY_SHORT[(d.getDay() + 6) % 7]}</div>
                <div style={{ fontSize: 16, fontWeight: 700 }}>{d.getDate()}</div>
                <div style={{ height: 6 }}>
                  {count > 0 && (
                    <div
                      style={{
                        width: 6,
                        height: 6,
                        borderRadius: 99,
                        margin: "0 auto",
                        background: active ? "#F7B32B" : "#1D5FD1",
                      }}
                    />
                  )}
                </div>
              </button>
            );
          })}
        </div>
        <Btn kind="ghost" small onClick={() => shiftWeek(1)}>›</Btn>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 17 }}>{niceDate(selected)}</div>
        <Btn kind="accent" small onClick={() => openNew()}>+ Les inplannen</Btn>
      </div>

      {absentiesOp(selected).map(({ t, abs }) => (
        <div key={t.id} style={{ background: "#FFF7E6", border: "1px solid #F7B32B", borderRadius: 12, padding: "8px 12px", marginBottom: 8, fontSize: 13 }}>
          🏖 <b>{t.name}</b>{" "}
          {abs
            ? `afwezig${abs.reason ? ` (${abs.reason})` : ""} t/m ${niceDate(abs.to)}`
            : "werkt normaal niet op deze dag"}
        </div>
      ))}

      {dayLessons.length === 0 && (
        <Empty icon="🚗" title="Geen lessen op deze dag" sub="Plan een les in met de knop hierboven." />
      )}

      {dayLessons.map((l) => {
        const s = student(l.studentId);
        const cat = catOf(s?.category);
        const pr = l.productId ? productOf(l.productId) : null;
        const kleur = lesColorOf(l);
        const cancelled = l.status === "geannuleerd";
        const done = l.status === "afgerond";
        return (
          <div
            key={l.id}
            style={{
              background: "#fff",
              borderRadius: 14,
              padding: 12,
              marginBottom: 10,
              borderLeft: `4px solid ${cancelled ? "#CBD5E1" : kleur}`,
              opacity: cancelled ? 0.55 : 1,
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
              <div
                onClick={() => { setForm({ ...l }); setShowForm(true); }}
                style={{ cursor: "pointer", flex: 1, WebkitTapHighlightColor: "transparent" }}
              >
                <div style={{ fontWeight: 700, fontSize: 15, textDecoration: cancelled ? "line-through" : "none" }}>
                  {l.time}–{endTime(l.time, l.dur)} · {s ? s.name : "Onbekende leerling"}
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap", alignItems: "center" }}>
                  {pr && <Chip color={kleur}>{pr.name}</Chip>}
                  <Chip color={cat.color}>{cat.label}</Chip>
                  {done && <Chip color="#16A34A">Afgerond</Chip>}
                  {cancelled && <Chip color="#64748B">Geannuleerd</Chip>}
                </div>
                {l.location && <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>📍 {l.location}</div>}
                {(l.vehicleId || l.teamId) && (
                  <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>
                    {l.vehicleId && (() => { const v = (data.vehicles || []).find((x) => x.id === l.vehicleId); return v ? `🚗 ${v.name}${v.plate ? ` (${v.plate})` : ""} ` : ""; })()}
                    {l.teamId && (() => { const t = (data.team || []).find((x) => x.id === l.teamId); return t ? `· 🧑‍🏫 ${t.name}` : ""; })()}
                  </div>
                )}
                {l.note && <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>{l.note}</div>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <Btn kind={done ? "ok" : "ghost"} small onClick={() => setStatus(l.id, "afgerond")}>✓</Btn>
                <Btn kind="ghost" small onClick={() => setStatus(l.id, "geannuleerd")}>✕</Btn>
                <Btn kind="ghost" small onClick={() => { setForm({ ...l }); setShowForm(true); }}>✎</Btn>
                <Btn kind="ghost" small onClick={() => lesBericht(l, cancelled ? "annulering" : "bevestiging")}>💬</Btn>
              </div>
            </div>
            <div style={{ textAlign: "right", marginTop: 4 }}>
              <button
                onClick={() => removeLesson(l.id)}
                style={{ background: "none", border: "none", color: "#94A3B8", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}
              >
                verwijderen
              </button>
            </div>
          </div>
        );
      })}

      {lesFormulier}
    </div>
  );
}

/* ================= LEERLINGEN ================= */
function Leerlingen({ data, update, goTab }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(null);
  const [search, setSearch] = useState("");
  const [profileId, setProfileId] = useState(null);

  const openNew = () => {
    setForm({ id: null, name: "", phone: "", email: "", birthday: "", address: "", zipcity: "", signup: toISO(new Date()), category: "schakel", pack: 20, rate: 55, progress: {}, notes: "", milestones: {} });
    setShowForm(true);
  };

  const importAanmelding = () => {
    const code = window.prompt("Plak hier de aanmeldcode die de leerling je heeft gestuurd:");
    if (!code) return;
    try {
      const j = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      if (!j.name) throw new Error("leeg");
      setForm({
        id: null,
        name: j.name || "",
        phone: j.phone || "",
        email: j.email || "",
        birthday: j.birthday || "",
        address: j.address || "",
        zipcity: j.zipcity || "",
        signup: toISO(new Date()),
        category: CATEGORIES.some((c) => c.id === j.category) ? j.category : "schakel",
        pack: 20,
        rate: 55,
        progress: {},
        notes: j.note ? `Aanmelding: ${j.note}` : "",
        milestones: { aanmelding: toISO(new Date()) },
      });
      setShowForm(true);
    } catch (e) {
      alert("Dit is geen geldige aanmeldcode. Vraag de leerling de code opnieuw te sturen.");
    }
  };

  const save = () => {
    if (!form.name.trim()) return alert("Vul een naam in.");
    update((d) => {
      if (form.id) {
        const i = d.students.findIndex((s) => s.id === form.id);
        d.students[i] = { ...d.students[i], ...form };
      } else {
        d.students.push({ ...form, id: uid() });
      }
      return d;
    });
    setShowForm(false);
  };

  const remove = (id) => {
    if (!window.confirm("Leerling én bijbehorende lessen verwijderen?")) return;
    update((d) => ({
      ...d,
      students: d.students.filter((s) => s.id !== id),
      lessons: d.lessons.filter((l) => l.studentId !== id),
    }));
    setProfileId(null);
  };

  const doneCount = (id) => data.lessons.filter((l) => l.studentId === id && l.status === "afgerond").length;

  /* ---------- profielweergave ---------- */
  if (profileId) {
    const s = data.students.find((x) => x.id === profileId);
    if (!s) { setProfileId(null); return null; }
    return (
      <LeerlingProfiel
        s={s}
        data={data}
        update={update}
        goTab={goTab}
        terug={() => setProfileId(null)}
        bewerk={() => { setForm({ ...s }); setShowForm(true); setProfileId(null); }}
        verwijder={() => remove(s.id)}
        done={doneCount(s.id)}
      />
    );
  }

  const [toonArchief, setToonArchief] = useState(false);
  const archiefN = data.students.filter((s) => s.archived).length;
  const list = data.students.filter(
    (s) => s.name.toLowerCase().includes(search.toLowerCase()) && (toonArchief ? s.archived : !s.archived)
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <input style={{ ...inputStyle, flex: 1 }} placeholder="Zoek leerling…" value={search} onChange={(e) => setSearch(e.target.value)} />
        <Btn kind="accent" onClick={openNew}>+ Nieuw</Btn>
      </div>
      <div style={{ marginBottom: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
        <Btn kind="ghost" small onClick={importAanmelding}>📥 Aanmelding invoeren (code)</Btn>
        {archiefN > 0 && (
          <Btn kind={toonArchief ? "primary" : "ghost"} small onClick={() => setToonArchief(!toonArchief)}>
            🗄 Archief ({archiefN})
          </Btn>
        )}
      </div>

      {list.length === 0 && (
        <Empty icon="👤" title="Nog geen leerlingen" sub="Voeg je eerste leerling toe om lessen te kunnen plannen." />
      )}

      {list.map((s) => {
        const cat = catOf(s.category);
        const done = doneCount(s.id);
        const pct = s.pack ? Math.min(100, Math.round((done / s.pack) * 100)) : 0;
        return (
          <div
            key={s.id}
            onClick={() => setProfileId(s.id)}
            style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10, cursor: "pointer" }}
            title="Open profiel"
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16 }}>{s.name} <span style={{ color: "#94A3B8", fontWeight: 400, fontSize: 13 }}>›</span></div>
                <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                  <Chip color={cat.color}>{cat.label}</Chip>
                  <Chip color="#64748B">{euro(s.rate)}/les</Chip>
                  {s.packName && <Chip color="#0E9594">📦 {s.packName}</Chip>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 6 }} onClick={(e) => e.stopPropagation()}>
                <Btn kind="ghost" small onClick={() => { setForm({ ...s }); setShowForm(true); }}>✎</Btn>
                <Btn kind="danger" small onClick={() => remove(s.id)}>🗑</Btn>
              </div>
            </div>
            <div style={{ marginTop: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#475569", marginBottom: 4 }}>
                <span>Lespakket</span>
                <span>
                  <b>{done}</b> van {s.pack} afgerond · <b>{Math.max(0, s.pack - done)}</b> tegoed
                </span>
              </div>
              <div style={{ background: "#E2E8F0", borderRadius: 99, height: 8 }}>
                <div style={{ width: pct + "%", background: cat.color, height: 8, borderRadius: 99, transition: "width .3s" }} />
              </div>
            </div>
          </div>
        );
      })}

      {showForm && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginTop: 4, border: "1px solid #E2E8F0" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>{form.id ? "Leerling bewerken" : "Nieuwe leerling"}</div>
          <Field label="Naam">
            <input style={inputStyle} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
          </Field>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Field label="Telefoon">
                <input style={inputStyle} value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} />
              </Field>
            </div>
            <div style={{ flex: 1 }}>
              <Field label="E-mail">
                <input style={inputStyle} value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} />
              </Field>
            </div>
          </div>
          <Field label="Geboortedatum (voor verjaardagen op het startscherm)">
            <input type="date" style={inputStyle} value={form.birthday || ""} onChange={(e) => setForm({ ...form, birthday: e.target.value })} />
          </Field>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1.4 }}>
              <Field label="Adres">
                <input style={inputStyle} value={form.address || ""} placeholder="Straat + huisnummer" onChange={(e) => setForm({ ...form, address: e.target.value })} />
              </Field>
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Postcode + plaats">
                <input style={inputStyle} value={form.zipcity || ""} onChange={(e) => setForm({ ...form, zipcity: e.target.value })} />
              </Field>
            </div>
          </div>
          <Field label="Categorie">
            <select style={inputStyle} value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
              {CATEGORIES.map((c) => (
                <option key={c.id} value={c.id}>{c.label}</option>
              ))}
            </select>
          </Field>
          <Field label="Lespakket (vult lessen & tarief automatisch in)">
            <select
              style={inputStyle}
              value={form.packageId || ""}
              onChange={(e) => {
                const pk = (data.packages || []).find((p) => p.id === e.target.value);
                if (pk) {
                  const prijs = packageTotal(pk, data.products);
                  setForm({
                    ...form,
                    packageId: pk.id,
                    packName: pk.name,
                    pack: pk.lessons,
                    rate: pk.lessons > 0 ? Math.round((prijs / pk.lessons) * 100) / 100 : 0,
                  });
                } else setForm({ ...form, packageId: "", packName: "" });
              }}
            >
              <option value="">— geen / losse lessen —</option>
              {(data.packages || [])
                .filter((p) => (p.cat || "schakel") === form.category)
                .map((p) => (
                  <option key={p.id} value={p.id}>
                    {p.name} · {euro(packageTotal(p, data.products))}
                  </option>
                ))}
            </select>
          </Field>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Field label="Pakket (aantal lessen)">
                <input type="number" style={inputStyle} value={form.pack} onChange={(e) => setForm({ ...form, pack: Number(e.target.value) })} />
              </Field>
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Tarief per les (€)">
                <input type="number" style={inputStyle} value={form.rate} onChange={(e) => setForm({ ...form, rate: Number(e.target.value) })} />
              </Field>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={save} style={{ flex: 1 }}>Opslaan</Btn>
            <Btn kind="ghost" onClick={() => setShowForm(false)}>Annuleren</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Leerlingprofiel ---------- */
function LeerlingProfiel({ s, data, update, goTab, terug, bewerk, verwijder, done }) {
  const [toonLk, setToonLk] = useState(false);
  const cat = catOf(s.category);
  const today = toISO(new Date());

  const lessen = data.lessons
    .filter((l) => l.studentId === s.id)
    .sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
  const volgende = data.lessons
    .filter((l) => l.studentId === s.id && l.status === "gepland" && l.date >= today)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time))[0];
  const facturen = data.invoices.filter((i) => i.studentId === s.id);
  const totalInv = (inv) => inv.lines.reduce((t, l) => t + Number(l.qty || 0) * Number(l.price || 0), 0);
  const openBedrag = facturen.filter((i) => i.status === "open" && i.type !== "offerte").reduce((t, i) => t + totalInv(i), 0);

  const lk = data.leskaart;
  const allTopics = lk.modules.flatMap((m) => m.topics);
  const maxV = lk.ratings.length;
  const ready = allTopics.filter((t) => Number(s.progress?.[t.id] || 0) >= maxV).length;
  const lkPct = allTopics.length ? Math.round((ready / allTopics.length) * 100) : 0;

  const productOf = (id) => (data.products || []).find((p) => p.id === id);
  const leeftijd = s.birthday ? new Date().getFullYear() - Number(s.birthday.slice(0, 4)) : null;

  const tegel = { flex: 1, background: "#fff", borderRadius: 12, padding: "12px 8px", textAlign: "center" };
  const kaart = { background: "#fff", borderRadius: 14, padding: 14, marginBottom: 12 };
  const kop = { fontWeight: 700, fontSize: 13, letterSpacing: 0.8, textTransform: "uppercase", color: "#475569", marginBottom: 10 };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <Btn kind="ghost" small onClick={terug}>‹ Alle leerlingen</Btn>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn kind="ghost" small onClick={bewerk}>✎ Bewerken</Btn>
          <Btn kind="danger" small onClick={verwijder}>🗑</Btn>
        </div>
      </div>

      {/* Kop */}
      <div style={{ background: "#16283E", color: "#fff", borderRadius: 16, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 52, height: 52, borderRadius: 99, background: cat.color, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 18, flexShrink: 0 }}>
            {s.name.split(" ").map((w) => w[0]).slice(0, 2).join("").toUpperCase()}
          </div>
          <div>
            <div style={{ fontSize: 19, fontWeight: 700 }}>{s.name}</div>
            <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
              <Chip color="#F7B32B">{cat.label}</Chip>
              {s.packName && <Chip color="#5BAE3A">📦 {s.packName}</Chip>}
            </div>
          </div>
        </div>
        <div style={{ fontSize: 13, color: "#9FB3CC", marginTop: 10, display: "flex", gap: 14, flexWrap: "wrap" }}>
          {s.phone && <span>📞 {s.phone}</span>}
          {s.email && <span>✉️ {s.email}</span>}
          {s.birthday && <span>🎂 {niceDate(s.birthday)}{leeftijd ? ` (${leeftijd} jr)` : ""}</span>}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          {s.email && (
            <a href={`mailto:${s.email}`} style={{ background: "#2E4460", color: "#fff", borderRadius: 10, padding: "8px 14px", fontSize: 13, fontWeight: 700, textDecoration: "none" }}>
              ✉️ Stuur een e-mail
            </a>
          )}
          {s.phone && (
            <a
              href={`https://wa.me/${(() => { const p = s.phone.replace(/\D/g, ""); return p.startsWith("0") ? "31" + p.slice(1) : p; })()}`}
              target="_blank" rel="noopener"
              style={{ background: "#25D366", color: "#fff", borderRadius: 10, padding: "8px 14px", fontSize: 13, fontWeight: 700, textDecoration: "none" }}
            >
              💬 Chat via WhatsApp
            </a>
          )}
          <button
            onClick={() => {
              const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES).welkom, {
                naam: s.name.split(" ")[0],
                rijschool: data.settings.company.name,
              });
              stuurWhatsApp(s.phone, text);
            }}
            style={{ background: "#F7B32B", color: "#16283E", border: "none", borderRadius: 10, padding: "8px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}
          >
            🎉 Welkomstbericht
          </button>
        </div>
      </div>

      {/* Adres */}
      {(s.address || s.zipcity) && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 14 }}>
            <div style={{ fontWeight: 700, marginBottom: 2 }}>🏠 Adres</div>
            {s.address && <div>{s.address}</div>}
            {s.zipcity && <div>{s.zipcity}</div>}
          </div>
          <a
            href={`https://maps.google.com/?q=${encodeURIComponent(`${s.address || ""} ${s.zipcity || ""}`)}`}
            target="_blank" rel="noopener"
            style={{ color: "#1D5FD1", fontWeight: 700, fontSize: 13, textDecoration: "none", whiteSpace: "nowrap" }}
          >
            📍 Open in Maps
          </a>
        </div>
      )}

      {/* Mijlpalen */}
      <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 12 }}>
        <div style={{ fontWeight: 700, fontSize: 13, letterSpacing: 0.8, textTransform: "uppercase", color: "#475569", marginBottom: 6 }}>Mijlpalen</div>
        {MIJLPALEN.map(([key, label]) => {
          const datum = (s.milestones || {})[key];
          return (
            <label key={key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderTop: "1px solid #EDF1F6", cursor: "pointer", fontSize: 14 }}>
              <input
                type="checkbox"
                checked={!!datum}
                onChange={() =>
                  update((d) => {
                    const st = d.students.find((x) => x.id === s.id);
                    if (!st.milestones) st.milestones = {};
                    if (st.milestones[key]) delete st.milestones[key];
                    else st.milestones[key] = toISO(new Date());
                    return d;
                  })
                }
                style={{ width: 18, height: 18, flexShrink: 0, accentColor: "#16A34A" }}
              />
              <span style={{ flex: 1, fontWeight: datum ? 700 : 400, color: datum ? "#16283E" : "#64748B" }}>{label}</span>
              {datum && <span style={{ fontSize: 12, color: "#64748B" }}>{niceDate(datum)}</span>}
            </label>
          );
        })}
      </div>

      {/* Statistieken */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <div style={tegel}>
          <div style={{ fontSize: 20, fontWeight: 700 }}>{done}</div>
          <div style={{ fontSize: 11, color: "#64748B" }}>lessen afgerond</div>
        </div>
        <div style={tegel}>
          <div style={{ fontSize: 20, fontWeight: 700 }}>{Math.max(0, (s.pack || 0) - done)}</div>
          <div style={{ fontSize: 11, color: "#64748B" }}>lessen tegoed</div>
        </div>
        <div style={tegel}>
          <div style={{ fontSize: 20, fontWeight: 700 }}>{lkPct}%</div>
          <div style={{ fontSize: 11, color: "#64748B" }}>leskaart examenklaar</div>
        </div>
        <div style={tegel}>
          <div style={{ fontSize: 20, fontWeight: 700, color: openBedrag > 0 ? "#E4572E" : "#16A34A" }}>{euro(openBedrag)}</div>
          <div style={{ fontSize: 11, color: "#64748B" }}>openstaand</div>
        </div>
      </div>

      {/* Volgende les */}
      <div style={kaart}>
        <div style={kop}>Volgende les</div>
        {volgende ? (
          <div style={{ fontSize: 14 }}>
            <b>{niceDate(volgende.date)}, {volgende.time}–{endTime(volgende.time, volgende.dur)}</b>
            {volgende.productId && productOf(volgende.productId) && (
              <Chip color={productOf(volgende.productId).color || "#1D5FD1"}> {productOf(volgende.productId).name}</Chip>
            )}
            {volgende.location && <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>📍 {volgende.location}</div>}
          </div>
        ) : (
          <div style={{ fontSize: 14, color: "#94A3B8" }}>Geen les gepland.</div>
        )}
        <div style={{ marginTop: 8 }}>
          <Btn kind="ghost" small onClick={() => goTab("agenda")}>Naar agenda →</Btn>
        </div>
      </div>

      {/* Leskaart */}
      <div style={kaart}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ ...kop, marginBottom: 0 }}>Leskaart</div>
          <span style={{ fontSize: 13, fontWeight: 700 }}>{ready} van {allTopics.length} · {lkPct}%</span>
        </div>
        <div style={{ background: "#E2E8F0", borderRadius: 99, height: 8, marginBottom: 10 }}>
          <div style={{ width: lkPct + "%", background: "#F7B32B", height: 8, borderRadius: 99, transition: "width .3s" }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Btn kind={toonLk ? "primary" : "accent"} small onClick={() => setToonLk(!toonLk)}>
            {toonLk ? "▲ Leskaart verbergen" : "📋 Leskaart invullen"}
          </Btn>
          <Btn kind="ghost" small onClick={() => goTab("leskaart")}>⚙️ Algemene leskaart aanpassen</Btn>
        </div>
        {toonLk && <LeskaartInvullen s={s} data={data} update={update} />}
      </div>

      {/* Reserveringen per leerling */}
      <div style={kaart}>
        <div style={kop}>Reserveringen</div>
        <label style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 14, marginBottom: 10, cursor: "pointer" }}>
          <input
            type="checkbox"
            checked={s.bookingAllowed !== false}
            onChange={(e) => update((d) => { const st = d.students.find((x) => x.id === s.id); st.bookingAllowed = e.target.checked; return d; })}
            style={{ width: 18, height: 18, flexShrink: 0 }}
          />
          Mag zelf lessen aanvragen via de persoonlijke link
        </label>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}>
            <Field label="Aanvraagtermijn voor deze leerling">
              <select
                style={inputStyle}
                value={s.bookingMinUren || ""}
                onChange={(e) => update((d) => { const st = d.students.find((x) => x.id === s.id); st.bookingMinUren = e.target.value ? Number(e.target.value) : ""; return d; })}
              >
                <option value="">Standaard ({(data.settings.booking || {}).minUren || 24} uur)</option>
                <option value={12}>12 uur</option>
                <option value={24}>24 uur</option>
                <option value={48}>48 uur</option>
                <option value={72}>72 uur</option>
              </select>
            </Field>
          </div>
          <div style={{ flex: 1 }}>
            <Field label="Vaste instructeur">
              <select
                style={inputStyle}
                value={s.vasteTeamId || ""}
                onChange={(e) => update((d) => { const st = d.students.find((x) => x.id === s.id); st.vasteTeamId = e.target.value; return d; })}
              >
                <option value="">— geen voorkeur —</option>
                {(data.team || []).filter((t) => t.role === "instructeur").map((t) => (
                  <option key={t.id} value={t.id}>{t.name}</option>
                ))}
              </select>
            </Field>
          </div>
        </div>
        <Btn
          kind="accent"
          style={{ width: "100%" }}
          onClick={() => {
            if (s.bookingAllowed === false)
              return alert(`Aanvragen staat uit voor ${s.name}. Zet het vinkje hierboven aan om de link te kunnen delen.`);
            if (openBedrag > 0 && !window.confirm(`⚠️ ${s.name} heeft nog ${euro(openBedrag)} openstaan. Toch de aanvraaglink sturen?`))
              return;
            const b = data.settings.booking || {};
            const sel = Array.isArray(b.lestypeIds) ? b.lestypeIds : null;
            const eigenTypes = (data.products || [])
              .filter((p) => (p.group || "overig") === "rijles" && (p.cat || "schakel") === s.category && (!sel || sel.includes(p.id)))
              .map((p) => p.name);
            const vaste = (data.team || []).find((t) => t.id === s.vasteTeamId);
            const payload = {
              naam: s.name,
              tel: s.phone || "",
              minUren: s.bookingMinUren || Number(b.minUren) || 24,
              lestypes: eigenTypes.length ? eigenTypes : regels(b.lestypes),
              instructeur: vaste ? vaste.name : "",
            };
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
            const url = `${window.location.origin}/lesaanvraag.html?d=${code}`;
            stuurWhatsApp(
              s.phone,
              `Hoi ${s.name.split(" ")[0]}! Via jouw persoonlijke link kun je rijlessen aanvragen bij ${data.settings.company.name}:\n${url}\n\nJe aanvraag bevestigen wij zo snel mogelijk. 🚗`
            );
          }}
        >

        </Btn>
        <div style={{ fontSize: 12, color: "#64748B", marginTop: 8, lineHeight: 1.5 }}>

        </div>
      </div>

      {/* Lesgeschiedenis */}
      <div style={kaart}>
        <div style={kop}>Lesgeschiedenis</div>
        {lessen.length === 0 && <div style={{ fontSize: 14, color: "#94A3B8" }}>Nog geen lessen.</div>}
        {lessen.slice(0, 10).map((l) => {
          const pr = l.productId ? productOf(l.productId) : null;
          return (
            <div key={l.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderTop: "1px solid #EDF1F6", fontSize: 13, gap: 8 }}>
              <span>
                {niceDate(l.date)} · {l.time}–{endTime(l.time, l.dur)}
                {pr && <span style={{ color: pr.color || "#1D5FD1", fontWeight: 700 }}> · {pr.name}</span>}
              </span>
              <Chip color={l.status === "afgerond" ? "#16A34A" : l.status === "geannuleerd" ? "#64748B" : "#1D5FD1"}>
                {l.status === "afgerond" ? "Afgerond" : l.status === "geannuleerd" ? "Geannuleerd" : "Gepland"}
              </Chip>
            </div>
          );
        })}
        {lessen.length > 10 && <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 6 }}>… en {lessen.length - 10} eerdere lessen</div>}
      </div>

      {/* Facturen */}
      <div style={kaart}>
        <div style={kop}>Facturen</div>
        {facturen.length === 0 && <div style={{ fontSize: 14, color: "#94A3B8" }}>Nog geen facturen.</div>}
        {facturen.map((i) => (
          <div key={i.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderTop: "1px solid #EDF1F6", fontSize: 13 }}>

              </Chip>
            </span>
          </div>
        ))}
        <div style={{ marginTop: 8 }}>
          <Btn kind="ghost" small onClick={() => goTab("facturen")}>Naar facturen →</Btn>

      {/* Notities */}
      <div style={kaart}>
        <div style={kop}>Notities</div>
        <textarea
          style={{ ...inputStyle, minHeight: 80 }}
          value={s.notes || ""}
          placeholder="Notities over deze leerling…"

        />
      </div>

      {/* Gegevens */}

        <div style={kop}>Gegevens</div>
        {[
          ["Opleiding", catOf(s.category).label],
          ["Geboortedatum", s.birthday ? `${niceDate(s.birthday)}${leeftijd ? ` (${leeftijd} jaar)` : ""}` : "—"],

  );
}

/* ---- Leskaart invullen voor één leerling (op het profiel) ---- */
function LeskaartInvullen({ s, data, update }) {
  const lk = data.leskaart;
  const ratings = lk.ratings || [];
  const maxV = ratings.length;

  const ratingOf = (topicId) => {
    const v = Number(s.progress?.[topicId] || 0);
    return v > maxV ? maxV : v;
  };

  const setLevel = (topicId, v) =>
    update((d) => {
      const st = d.students.find((x) => x.id === s.id);
      if (!st) return d;
      if (!st.progress) st.progress = {};
      st.progress[topicId] = st.progress[topicId] === v ? 0 : v;
      return d;
    });

  return (
    <div style={{ marginTop: 10 }}>
      {/* Legenda */}
      <div style={{ background: "#F7F9FC", borderRadius: 12, padding: "10px 12px", marginBottom: 12 }}>
        {ratings.map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "#475569", padding: "2px 0" }}>
            <span style={{ width: 20, height: 20, borderRadius: 6, background: r.color, color: "#fff", fontWeight: 700, fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i + 1}</span>
            {r.label}
          </div>
        ))}
      </div>

      {lk.modules.map((m) => (
        <div key={m.id} style={{ marginBottom: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: "#475569", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6 }}>
            {m.name}
          </div>
          {m.topics.map((t) => {
            const v = ratingOf(t.id);
            const r = v > 0 ? ratings[v - 1] : null;
            return (
              <div key={t.id} style={{ background: "#F7F9FC", borderRadius: 12, padding: "10px 12px", marginBottom: 6 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{t.name}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: r ? r.color : "#94A3B8", textAlign: "right" }}>
                    {r ? r.label : "Niet beoordeeld"}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 3 }}>
                  {ratings.map((rr, i) => {
                    const val = i + 1;
                    const actief = v === val;
                    return (
                      <button
                        key={i}
                        onClick={() => setLevel(t.id, val)}
                        aria-label={rr.label}
                        style={{
                          flex: 1,
                          height: 28,
                          borderRadius: 6,
                          border: "none",
                          cursor: "pointer",
                          fontWeight: 700,
                          fontSize: 11,
                          fontFamily: "inherit",
                          background: v >= val ? rr.color : "#E7ECF3",
                          color: v >= val ? "#fff" : "#94A3B8",
                          outline: actief ? "2px solid #16283E" : "none",
                          outlineOffset: 1,
                        }}
                      >
                        {val}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}
