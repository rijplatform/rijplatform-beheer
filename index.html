/* ================= FACTUREN ================= */
function Facturen({ data, update, onPrint }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(null);
  const [open, setOpen] = useState(null);

  const inv$ = data.settings.invoice;

  const nextNumber = (type) => {
    const y = new Date().getFullYear();
    const prefix = type === "offerte" ? inv$.quotePrefix || "OF" : inv$.prefix || "RP";
    const start = type === "offerte" ? 1 : Number(inv$.startNr) || 1;
    let hoogste = 0;
    data.invoices.forEach((i) => {
      if (i.number && i.number.startsWith(`${prefix}-${y}-`)) {
        const n = parseInt(i.number.split("-").pop(), 10);
        if (!isNaN(n) && n > hoogste) hoogste = n;
      }
    });
    const n = Math.max(start, hoogste + 1);
    const pad = Math.max(3, String(start).length);
    return `${prefix}-${y}-${String(n).padStart(pad, "0")}`;
  };

  const openNew = () => {
    const s = data.students[0];
    setForm({
      id: null,
      type: "factuur",
      number: nextNumber("factuur"),
      studentId: s?.id || "",
      date: toISO(new Date()),
      sendDate: "",
      status: "open",
      lines: [{ desc: "Rijlessen", qty: 1, price: s?.rate || 55 }],
    });
    setShowForm(true);
  };

  const shareInvoice = async (inv) => {
    const c = data.settings.company;
    const s = data.students.find((x) => x.id === inv.studentId);
    const bedrag = euro(inv.lines.reduce((t, l) => t + Number(l.qty || 0) * Number(l.price || 0), 0));
    const verval = (() => {
      const d = fromISO(inv.date);
      d.setDate(d.getDate() + (Number(inv$.dueDays) || 14));
      return niceDate(toISO(d));
    })();
    const isCredit = inv.type === "credit";
    const isOfferte = inv.type === "offerte";
    let text = `${isCredit ? "Creditfactuur" : isOfferte ? "Offerte" : "Factuur"} ${inv.number} — ${c.name}\n`;
    if (s) text += `T.a.v. ${s.name}\n`;
    text += `Bedrag: ${bedrag}\n`;
    if (!isCredit && !isOfferte) {
      text += `Betalen vóór: ${verval}\n`;
      if (c.iban) text += `IBAN: ${c.iban} t.n.v. ${c.name}, o.v.v. ${inv.number}\n`;
      if (inv.payLink) text += `Online betalen: ${inv.payLink}\n`;
    }
    if (c.phone || c.email) text += `Vragen? ${[c.phone, c.email].filter(Boolean).join(" · ")}`;
    try {
      if (navigator.share) {
        await navigator.share({ title: `${inv.number} — ${c.name}`, text });
      } else {
        await navigator.clipboard.writeText(text);
        alert("Bericht gekopieerd — plak het in WhatsApp of e-mail.");
      }
    } catch (e) {
      /* delen geannuleerd */
    }
  };

  const makeCredit = (inv) => {
    if (!window.confirm(`Creditfactuur maken voor ${inv.number}?`)) return;
    const credit = {
      ...structuredClone(inv),
      id: uid(),
      type: "credit",
      number: nextNumber("factuur"),
      refNumber: inv.number,
      date: toISO(new Date()),
      sendDate: "",
      status: "open",
      lines: inv.lines.map((l) => ({ ...l, price: -Math.abs(Number(l.price) || 0) })),
    };
    update((d) => {
      d.invoices.push(credit);
      return d;
    });
    setOpen(credit.id);
  };

  const markSent = (id) =>
    update((d) => {
      const i = d.invoices.find((x) => x.id === id);
      if (i) i.sent = true;
      return d;
    });

  const makePayLink = async (inv) => {
    const body = JSON.stringify({
      amount: total(inv),
      description: `${inv.number} — ${data.settings.company.name}`,
      redirectUrl: window.location.origin,
    });
    const opties = { method: "POST", headers: { "Content-Type": "application/json" }, body };
    try {
      // Eerst Stripe proberen (iDEAL + kaart); lukt dat niet, dan Mollie
      let provider = "stripe";
      let r = await fetch("/api/stripe-create", opties);
      let j = await r.json().catch(() => ({}));
      if (!r.ok || !(j.url || j.paymentUrl)) {
        provider = "mollie";
        r = await fetch("/api/mollie-create", opties);
        j = await r.json().catch(() => ({}));
        if (!r.ok || !(j.url || j.paymentUrl)) throw new Error(j.error || "Geen betaallink ontvangen");
      }
      update((d) => {
        const i = d.invoices.find((x) => x.id === inv.id);
        i.payLink = j.url || j.paymentUrl;
        i.mollieId = j.id;
        i.payProvider = provider;
        return d;
      });
      alert(`✓ Betaallink (${provider === "stripe" ? "Stripe: iDEAL + kaart" : "Mollie: iDEAL"}) aangemaakt en aan de factuur toegevoegd.`);
    } catch (e) {
      alert(
        "Kon geen betaallink maken: " + e.message +
        "\n\nControleer of de map /api op GitHub staat en of STRIPE_SECRET_KEY of MOLLIE_API_KEY is ingesteld in Vercel (Settings → Environment Variables)."
      );
    }
  };

  const checkPayment = async (inv) => {
    try {
      const endpoint = inv.payProvider === "stripe" ? "/api/stripe-status" : "/api/mollie-status";
      const r = await fetch(`${endpoint}?id=${encodeURIComponent(inv.mollieId)}`);
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || "Onbekende fout");
      if (j.paid) {
        update((d) => {
          const i = d.invoices.find((x) => x.id === inv.id);
          i.status = "betaald";
          i.payMethod = inv.payProvider === "stripe" ? "iDEAL/kaart (Stripe)" : "iDEAL (Mollie)";
          return d;
        });
        betaalMail(inv, inv.payProvider === "stripe" ? "iDEAL/kaart (Stripe)" : "iDEAL (Mollie)");
        alert("💚 Betaald! De factuur is gemarkeerd als betaald.");
      } else {
        alert("Nog niet betaald volgens Mollie.");
      }
    } catch (e) {
      alert("Betaalstatus ophalen mislukt: " + e.message);
    }
  };

  const total = (inv) => inv.lines.reduce((t, l) => t + Number(l.qty || 0) * Number(l.price || 0), 0);
  const btw = (inv) => {
    const vat = Number(inv$.vat) || 0;
    return vat > 0 ? total(inv) - total(inv) / (1 + vat / 100) : 0;
  };

  const save = () => {
    if (!form.studentId) return alert("Kies een leerling.");
    update((d) => {
      if (form.id) {
        const i = d.invoices.findIndex((x) => x.id === form.id);
        d.invoices[i] = form;
      } else d.invoices.push({ ...form, id: uid() });
      return d;
    });
    setShowForm(false);
  };

  const betaalMail = (inv, wijze) => {
    if (!data.settings.autoMail) return;
    const s = student(inv.studentId);
    if (!s || !s.email) return;
    const text = vulSjabloon((data.settings.messages || DEFAULT_MSG_TEMPLATES).betaald || "", {
      naam: s.name.split(" ")[0],
      rijschool: data.settings.company.name,
      bedrag: euro(total(inv)),
      nummer: inv.number,
      wijze: wijze || "overboeking",
    });
    mailAuto(s.email, `${MAIL_ONDERWERPEN.betaald} — ${inv.number}`, text, data.settings.company.name)
      .catch((e) => alert("Automatische mail niet verstuurd: " + e.message));
  };

  const toggle = (id) => {
    const inv = data.invoices.find((x) => x.id === id);
    if (!inv) return;
    const wordtBetaald = inv.status === "open";
    let wijze = inv.payMethod || "";
    if (wordtBetaald && inv.type !== "offerte") {
      wijze = window.prompt("Hoe is er betaald? (bijv. iDEAL, Tikkie, contant, pin, creditcard, overboeking)", wijze || "iDEAL");
      if (wijze === null) return;
      wijze = wijze.trim() || "overboeking";
    }
    update((d) => {
      const i = d.invoices.find((x) => x.id === id);
      i.status = wordtBetaald ? "betaald" : "open";
      if (wordtBetaald) i.payMethod = wijze;
      return d;
    });
    if (wordtBetaald && inv.type === "factuur") betaalMail(inv, wijze);
  };

  const remove = (id) => {
    if (!window.confirm("Factuur verwijderen?")) return;
    update((d) => ({ ...d, invoices: d.invoices.filter((i) => i.id !== id) }));
  };

  const student = (id) => data.students.find((s) => s.id === id);
  const openSum = data.invoices
    .filter((i) => i.status === "open" && i.type !== "offerte")
    .reduce((t, i) => t + total(i), 0);

  const today = toISO(new Date());
  const toSend = data.invoices.filter((i) => i.sendDate && !i.sent && i.sendDate <= today);

  return (
    <div>
      {toSend.length > 0 && (
        <div style={{ background: "#FFF7E6", border: "1px solid #F7B32B", borderRadius: 14, padding: 12, marginBottom: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>📤 Te versturen ({toSend.length})</div>
          {toSend.map((i) => {
            const s = student(i.studentId);
            return (
              <div key={i.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, padding: "6px 0", borderTop: "1px solid #FDE9C0", flexWrap: "wrap" }}>
                <div style={{ fontSize: 13 }}>
                  <b>{i.number}</b> · {s ? s.name : "—"} · {euro(total(i))}
                  <span style={{ color: "#92700C" }}> · gepland {niceDate(i.sendDate)}</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn kind="accent" small onClick={() => shareInvoice(i)}>📤 Deel</Btn>
                  <Btn kind="ok" small onClick={() => markSent(i.id)}>✓ Verzonden</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 13, color: "#64748B" }}>Openstaand</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>{euro(openSum)}</div>
        </div>
        <Btn kind="accent" onClick={openNew}>+ Nieuwe factuur</Btn>
      </div>

      {data.invoices.length === 0 && (
        <Empty icon="💶" title="Nog geen facturen" sub="Maak je eerste factuur voor een leerling." />
      )}

      {[...data.invoices].reverse().map((inv) => {
        const s = student(inv.studentId);
        const isOpen = open === inv.id;
        return (
          <div key={inv.id} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10 }}>
            <div
              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
              onClick={() => setOpen(isOpen ? null : inv.id)}
            >
              <div>
                <div style={{ fontWeight: 700 }}>{inv.number}</div>
                <div style={{ fontSize: 13, color: "#64748B" }}>
                  {s ? s.name : "—"} · {niceDate(inv.date)}
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 700 }}>{euro(total(inv))}</div>
                {inv.type === "offerte" ? (
                  <Chip color="#1D5FD1">Offerte</Chip>
                ) : inv.type === "credit" ? (
                  <Chip color="#8B5CF6">{inv.status === "betaald" ? "Credit · verwerkt" : "Creditfactuur"}</Chip>
                ) : (
                  <Chip color={inv.status === "betaald" ? "#16A34A" : "#E4572E"}>
                    {inv.status === "betaald" ? "Betaald" : "Open"}
                  </Chip>
                )}
              </div>
            </div>

            {isOpen && (
              <div style={{ marginTop: 10, borderTop: "1px solid #EDF1F6", paddingTop: 10 }}>
                {inv.lines.map((l, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 4 }}>
                    <span>{l.qty}× {l.desc}</span>
                    <span>{euro(l.qty * l.price)}</span>
                  </div>
                ))}
                {inv.status === "betaald" && inv.payMethod && (
                  <div style={{ fontSize: 12, color: "#16A34A", marginTop: 6 }}>✓ Betaald via {inv.payMethod}</div>
                )}
                {Number(inv$.vat) > 0 && (
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748B", marginTop: 6 }}>
                    <span>waarvan {inv$.vat}% btw</span>
                    <span>{euro(btw(inv))}</span>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                  <Btn kind="accent" small onClick={() => onPrint(inv, inv.type === "offerte" ? "offerte" : inv.type === "credit" ? "credit" : "factuur")}>
                    🖨 Bekijk / print
                  </Btn>
                  <Btn kind="ghost" small onClick={() => shareInvoice(inv)}>📤 Deel</Btn>
                  {(() => {
                    const s = student(inv.studentId);
                    if (!s || !s.email) return null;
                    return (
                      <Btn
                        kind="ghost"
                        small
                        onClick={async () => {
                          const type = inv.type === "offerte" ? "Offerte" : inv.type === "credit" ? "Creditfactuur" : "Factuur";
                          const c = data.settings.company;
                          let text = `Beste ${s.name.split(" ")[0]},\n\nHierbij ${type.toLowerCase()} ${inv.number} van ${c.name}.\nBedrag: ${euro(total(inv))}\n`;
                          if (inv.type === "factuur") {
                            if (c.iban) text += `Betalen kan op ${c.iban} t.n.v. ${c.name}, o.v.v. ${inv.number}.\n`;
                            if (inv.payLink) text += `Online betalen: ${inv.payLink}\n`;
                          }
                          text += `\nMet vriendelijke groet,\n${c.name}`;
                          try {
                            await mailAuto(s.email, `${type} ${inv.number} — ${c.name}`, text, c.name);
                            update((d) => { const i = d.invoices.find((x) => x.id === inv.id); i.sent = true; return d; });
                            alert(`✉️ ${type} gemaild naar ${s.email}`);
                          } catch (e) {
                            alert("Mailen mislukt: " + e.message);
                          }
                        }}
                      >
                        ✉️ Mail direct
                      </Btn>
                    );
                  })()}
                  {inv.type === "factuur" && inv.status === "open" && !inv.payLink && (
                    <Btn kind="ghost" small onClick={() => makePayLink(inv)}>💳 iDEAL-link</Btn>
                  )}
                  {inv.mollieId && inv.status === "open" && (
                    <Btn kind="ghost" small onClick={() => checkPayment(inv)}>🔄 Betaalstatus</Btn>
                  )}
                  {inv.type === "factuur" && (
                    <Btn kind="ghost" small onClick={() => makeCredit(inv)}>↩ Crediteer</Btn>
                  )}
                  {inv.type !== "offerte" && inv.type !== "credit" && inv.status === "open" && (
                    <select
                      style={{ ...inputStyle, width: "auto", padding: "6px 10px", fontSize: 13 }}
                      value=""
                      onChange={(e) => { if (e.target.value) onPrint(inv, e.target.value); }}
                    >
                      <option value="">⚠️ Herinnering / aanmaning…</option>
                      <option value="herinnering">1. Betalingsherinnering</option>
                      <option value="aanmaning">2. Aanmaning</option>
                      <option value="aanmaning14">3. Laatste aanmaning (14-dagenbrief)</option>
                    </select>
                  )}
                  {inv.type !== "offerte" && (
                    <Btn kind={inv.status === "betaald" ? "ghost" : "ok"} small onClick={() => toggle(inv.id)}>
                      {inv.type === "credit"
                        ? inv.status === "betaald" ? "Markeer als open" : "✓ Markeer verwerkt"
                        : inv.status === "betaald" ? "Markeer als open" : "✓ Markeer betaald"}
                    </Btn>
                  )}
                  <Btn kind="ghost" small onClick={() => { setForm(structuredClone(inv)); setShowForm(true); }}>✎ Bewerken</Btn>
                  <Btn kind="danger" small onClick={() => remove(inv.id)}>🗑</Btn>
                </div>
              </div>
            )}
          </div>
        );
      })}

      {showForm && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginTop: 4, border: "1px solid #E2E8F0" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>{form.id ? "Document bewerken" : `Nieuw document · ${form.number}`}</div>
          <Field label="Type">
            <select
              style={inputStyle}
              value={form.type || "factuur"}
              onChange={(e) => {
                const type = e.target.value;
                setForm({ ...form, type, number: form.id ? form.number : nextNumber(type) });
              }}
            >
              <option value="factuur">Factuur</option>
              <option value="offerte">Offerte</option>
            </select>
          </Field>
          <Field label="Leerling">
            <select
              style={inputStyle}
              value={form.studentId}
              onChange={(e) => {
                const s = student(e.target.value);
                setForm({ ...form, studentId: e.target.value, lines: form.lines.map((l, i) => (i === 0 && s ? { ...l, price: s.rate } : l)) });
              }}
            >
              <option value="">— kies leerling —</option>
              {data.students.map((s) => (
                <option key={s.id} value={s.id}>{s.name}</option>
              ))}
            </select>
          </Field>
          <Field label="Datum">
            <input type="date" style={inputStyle} value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
          </Field>
          {form.type !== "offerte" && (
            <Field label="Betaallink (optioneel — bijv. Tikkie of Mollie-betaallink)">
              <input style={inputStyle} value={form.payLink || ""} placeholder="https://…" onChange={(e) => setForm({ ...form, payLink: e.target.value })} />
            </Field>
          )}
          <Field label="Verzenddatum (optioneel — je krijgt die dag een herinnering bovenaan deze tab)">
            <input type="date" style={inputStyle} value={form.sendDate || ""} onChange={(e) => setForm({ ...form, sendDate: e.target.value, sent: false })} />
          </Field>

          <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4 }}>Regels</div>
          {form.lines.map((l, i) => (
            <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6 }}>
              <input
                style={{ ...inputStyle, flex: 2 }}
                value={l.desc}
                placeholder="Omschrijving"
                onChange={(e) => {
                  const lines = [...form.lines];
                  lines[i] = { ...l, desc: e.target.value };
                  setForm({ ...form, lines });
                }}
              />
              <input
                type="number"
                style={{ ...inputStyle, width: 64 }}
                value={l.qty}
                onChange={(e) => {
                  const lines = [...form.lines];
                  lines[i] = { ...l, qty: Number(e.target.value) };
                  setForm({ ...form, lines });
                }}
              />
              <input
                type="number"
                style={{ ...inputStyle, width: 84 }}
                value={l.price}
                onChange={(e) => {
                  const lines = [...form.lines];
                  lines[i] = { ...l, price: Number(e.target.value) };
                  setForm({ ...form, lines });
                }}
              />
              <button
                onClick={() => setForm({ ...form, lines: form.lines.filter((_, x) => x !== i) })}
                style={{ background: "none", border: "none", color: "#94A3B8", cursor: "pointer", fontSize: 16 }}
              >
                ✕
              </button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <Btn kind="ghost" small onClick={() => setForm({ ...form, lines: [...form.lines, { desc: "", qty: 1, price: 0 }] })}>
              + Regel
            </Btn>
            <select
              style={{ ...inputStyle, width: "auto", padding: "6px 10px", fontSize: 13 }}
              value=""
              onChange={(e) => {
                const pk = (data.packages || []).find((p) => p.id === e.target.value);
                if (pk) setForm({ ...form, lines: [...form.lines, { desc: pk.name, qty: 1, price: packageTotal(pk, data.products) }] });
              }}
            >
              <option value="">📦 Pakket als regel…</option>
              {(data.packages || [])
                .filter((p) => { const s = student(form.studentId); return !s || (p.cat || "schakel") === s.category; })
                .map((p) => (
                  <option key={p.id} value={p.id}>{p.name} · {euro(packageTotal(p, data.products))}</option>
                ))}
            </select>
            {(data.products || []).length > 0 && (
              <select
                style={{ ...inputStyle, width: "auto", padding: "6px 10px", fontSize: 13 }}
                value=""
                onChange={(e) => {
                  const pr = (data.products || []).find((p) => p.id === e.target.value);
                  if (pr) setForm({ ...form, lines: [...form.lines, { desc: pr.name, qty: 1, price: Number(pr.price) || 0 }] });
                }}
              >
                <option value="">🧾 Los element als regel…</option>
                {PRODUCT_GROUPS.map(([gid, glabel]) => {
                  const stu = student(form.studentId);
                  const items = (data.products || []).filter(
                    (p) => (p.group || "overig") === gid && (!stu || (p.cat || "schakel") === stu.category)
                  );
                  return items.length ? (
                    <optgroup key={gid} label={glabel}>
                      {items.map((p) => (
                        <option key={p.id} value={p.id}>{p.name} · {euro(p.price)}</option>
                      ))}
                    </optgroup>
                  ) : null;
                })}
              </select>
            )}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, margin: "12px 0" }}>
            <span>Totaal (incl. btw)</span>
            <span>{euro(total(form))}</span>
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={save} style={{ flex: 1 }}>Opslaan</Btn>
            <Btn kind="ghost" onClick={() => setShowForm(false)}>Annuleren</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= PAKKETTEN ================= */
function Pakketten({ data, update }) {
  const [prodDraft, setProdDraft] = useState(null);
  const [form, setForm] = useState(null);

  const [cat, setCat] = useState("schakel");
  const allProducts = data.products || [];
  const products = allProducts.filter((p) => (p.cat || "schakel") === cat);
  const pakketten = (data.packages || []).filter((p) => (p.cat || "schakel") === cat);

  /* ---- losse elementen ---- */
  const saveProduct = () => {
    if (!prodDraft.name.trim()) return alert("Geef het element een naam.");
    update((d) => {
      if (!d.products) d.products = [];
      const i = d.products.findIndex((p) => p.id === prodDraft.id);
      if (i >= 0) d.products[i] = prodDraft;
      else d.products.push(prodDraft);
      return d;
    });
    setProdDraft(null);
  };

  const removeProduct = (id) => {
    const inGebruik = (data.packages || []).some((p) => (p.items || []).some((it) => it.productId === id));
    if (inGebruik) return alert("Dit element zit nog in een pakket. Haal het eerst uit het pakket.");
    if (!window.confirm("Element verwijderen?")) return;
    update((d) => ({ ...d, products: d.products.filter((p) => p.id !== id) }));
  };

  /* ---- pakketten ---- */
  const lesTelling = (items) =>
    (items || []).reduce((t, it) => {
      const pr = allProducts.find((x) => x.id === it.productId);
      return t + (pr && (pr.group || "overig") === "rijles" ? Number(it.qty || 1) : 0);
    }, 0);

  const openNewPackage = () =>
    setForm({ id: null, name: "", items: [], lessons: 0, priceOverride: "", cat });

  const savePackage = () => {
    if (!form.name.trim()) return alert("Geef het pakket een naam.");
    update((d) => {
      if (!d.packages) d.packages = [];
      const i = d.packages.findIndex((p) => p.id === form.id);
      const pkg = { ...form, price: packageSum(form, d.products || []) };
      if (i >= 0) d.packages[i] = pkg;
      else d.packages.push({ ...pkg, id: uid() });
      return d;
    });
    setForm(null);
  };

  const removePackage = (id) => {
    if (!window.confirm("Pakket verwijderen? (Leerlingen die dit pakket al hebben, behouden hun tegoed.)")) return;
    update((d) => ({ ...d, packages: d.packages.filter((p) => p.id !== id) }));
  };

  const setItem = (idx, patch) => {
    const items = form.items.map((it, i) => (i === idx ? { ...it, ...patch } : it));
    setForm({ ...form, items, lessons: lesTelling(items) });
  };
  const addItem = () => {
    if (!products.length) return alert("Voeg eerst losse elementen toe hierboven.");
    const items = [...form.items, { productId: products[0].id, qty: 1 }];
    setForm({ ...form, items, lessons: lesTelling(items) });
  };
  const removeItem = (idx) => {
    const items = form.items.filter((_, i) => i !== idx);
    setForm({ ...form, items, lessons: lesTelling(items) });
  };

  return (
    <div>
      {/* ===== Opleiding kiezen ===== */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
        {CATEGORIES.map((c) => (
          <button
            key={c.id}
            onClick={() => setCat(c.id)}
            style={{
              border: "none", cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 13,
              borderRadius: 999, padding: "8px 14px",
              background: cat === c.id ? c.color : "#fff",
              color: cat === c.id ? "#fff" : "#334155",
            }}
          >
            {c.label}
          </button>
        ))}
      </div>

      {/* ===== Losse elementen ===== */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 17 }}>Losse elementen · {catOf(cat).label}</div>
        <Btn kind="accent" small onClick={() => setProdDraft({ id: uid(), name: "", price: 0, group: "rijles", color: GROUP_COLORS.rijles, cat })}>+ Element</Btn>
      </div>

      {products.length === 0 && !prodDraft && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 14, fontSize: 13, color: "#64748B" }}>
          Bouw eerst je prijslijst op: losse rijles, proefles, praktijkexamen, tussentijdse toets, theoriecursus, korting (negatief bedrag), enz. Daarna stel je er hieronder pakketten mee samen.
        </div>
      )}

      {PRODUCT_GROUPS.map(([gid, glabel]) => {
        const items = products.filter((p) => (p.group || "overig") === gid);
        if (!items.length) return null;
        return (
          <div key={gid} style={{ background: "#fff", borderRadius: 14, padding: "10px 14px", marginBottom: 10 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#475569", marginBottom: 4 }}>{glabel}</div>
            {items.map((p) => (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderTop: "1px solid #EDF1F6", fontSize: 14 }}>
                <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 12, height: 12, borderRadius: 4, background: p.color || GROUP_COLORS[p.group] || "#64748B", flexShrink: 0 }} />
                  {p.name}
                </span>
                <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <b style={{ color: Number(p.price) < 0 ? "#16A34A" : "#16283E" }}>{euro(p.price)}</b>
                  <Btn kind="ghost" small onClick={() => setProdDraft({ ...p })}>✎</Btn>
                  <Btn kind="danger" small onClick={() => removeProduct(p.id)}>🗑</Btn>
                </span>
              </div>
            ))}
          </div>
        );
      })}

      {prodDraft && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 14, border: "1px solid #E2E8F0" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>Element</div>
          <Field label="Naam">
            <input style={inputStyle} value={prodDraft.name} placeholder="bijv. Losse rijles 60 min" onChange={(e) => setProdDraft({ ...prodDraft, name: e.target.value })} />
          </Field>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Field label="Prijs (€, negatief = korting)">
                <input type="number" style={inputStyle} value={prodDraft.price} onChange={(e) => setProdDraft({ ...prodDraft, price: Number(e.target.value) })} />
              </Field>
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Groep">
                <select
                  style={inputStyle}
                  value={prodDraft.group}
                  onChange={(e) => {
                    const g = e.target.value;
                    const hadDefault = !prodDraft.color || Object.values(GROUP_COLORS).includes(prodDraft.color);
                    setProdDraft({ ...prodDraft, group: g, color: hadDefault ? GROUP_COLORS[g] : prodDraft.color });
                  }}
                >
                  {PRODUCT_GROUPS.map(([gid, glabel]) => (
                    <option key={gid} value={gid}>{glabel}</option>
                  ))}
                </select>
              </Field>
            </div>
            <div style={{ flex: 0.6 }}>
              <Field label="Kleur">
                <input type="color" style={{ ...inputStyle, padding: 4, height: 42 }} value={prodDraft.color || GROUP_COLORS[prodDraft.group] || "#64748B"} onChange={(e) => setProdDraft({ ...prodDraft, color: e.target.value })} />
              </Field>
            </div>
          </div>
          <Field label="Opleiding">
            <select style={inputStyle} value={prodDraft.cat || "schakel"} onChange={(e) => setProdDraft({ ...prodDraft, cat: e.target.value })}>
              {CATEGORIES.map((c) => (
                <option key={c.id} value={c.id}>{c.label}</option>
              ))}
            </select>
          </Field>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={saveProduct} style={{ flex: 1 }}>Opslaan</Btn>
            <Btn kind="ghost" onClick={() => setProdDraft(null)}>Annuleren</Btn>
          </div>
        </div>
      )}

      {/* ===== Pakketten ===== */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "18px 0 10px" }}>
        <div style={{ fontWeight: 700, fontSize: 17 }}>Pakketten · {catOf(cat).label}</div>
        <Btn kind="accent" small onClick={openNewPackage}>+ Pakket samenstellen</Btn>
      </div>

      {pakketten.length === 0 && (
        <Empty icon="📦" title="Nog geen pakketten" sub="Stel een pakket samen uit je losse elementen." />
      )}

      {pakketten.map((p) => {
        const som = packageSum(p, allProducts);
        const totaal = packageTotal(p, allProducts);
        const korting = som - totaal;
        return (
          <div key={p.id} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{p.name}</div>
                {(p.items || []).map((it, i) => {
                  const pr = allProducts.find((x) => x.id === it.productId);
                  return pr ? (
                    <div key={i} style={{ fontSize: 13, color: "#64748B" }}>
                      {it.qty}× {pr.name} · {euro(Number(pr.price) * Number(it.qty || 1))}
                    </div>
                  ) : null;
                })}
                <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>
                  {korting > 0.005 && <span style={{ textDecoration: "line-through", marginRight: 6 }}>{euro(som)}</span>}
                  <b style={{ color: "#16283E" }}>{euro(totaal)}</b>
                  {korting > 0.005 && <span style={{ color: "#16A34A" }}> (−{euro(korting)} pakketvoordeel)</span>}
                  {p.lessons > 0 && <span> · {p.lessons} lessen tegoed</span>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <Btn kind="ghost" small onClick={() => setForm({ items: [], priceOverride: "", cat: "schakel", ...structuredClone(p) })}>✎</Btn>
                <Btn kind="danger" small onClick={() => removePackage(p.id)}>🗑</Btn>
              </div>
            </div>
          </div>
        );
      })}

      {form && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginTop: 4, border: "1px solid #E2E8F0" }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>{form.id ? "Pakket bewerken" : "Pakket samenstellen"}</div>
          <Field label="Naam">
            <input style={inputStyle} value={form.name} placeholder="bijv. Compleet pakket 20 lessen + examen" onChange={(e) => setForm({ ...form, name: e.target.value })} />
          </Field>
          <Field label="Opleiding">
            <select style={inputStyle} value={form.cat || "schakel"} onChange={(e) => setForm({ ...form, cat: e.target.value })}>
              {CATEGORIES.map((c) => (
                <option key={c.id} value={c.id}>{c.label}</option>
              ))}
            </select>
          </Field>

          <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4 }}>Elementen in dit pakket</div>
          {form.items.length === 0 && (
            <div style={{ fontSize: 13, color: "#94A3B8", marginBottom: 6 }}>Nog geen elementen toegevoegd.</div>
          )}
          {form.items.map((it, i) => (
            <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input
                type="number"
                min="1"
                style={{ ...inputStyle, width: 60 }}
                value={it.qty}
                onChange={(e) => setItem(i, { qty: Number(e.target.value) })}
              />
              <span style={{ color: "#94A3B8" }}>×</span>
              <select style={{ ...inputStyle, flex: 1 }} value={it.productId} onChange={(e) => setItem(i, { productId: e.target.value })}>
                {PRODUCT_GROUPS.map(([gid, glabel]) => {
                  const items = products.filter((p) => (p.group || "overig") === gid);
                  return items.length ? (
                    <optgroup key={gid} label={glabel}>
                      {items.map((p) => (
                        <option key={p.id} value={p.id}>{p.name} · {euro(p.price)}</option>
                      ))}
                    </optgroup>
                  ) : null;
                })}
              </select>
              <button onClick={() => removeItem(i)} style={{ background: "none", border: "none", color: "#94A3B8", cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
          ))}
          <Btn kind="ghost" small onClick={addItem}>+ Element toevoegen</Btn>

          <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, margin: "12px 0 8px" }}>
            <span>Som van elementen</span>
            <span>{euro(packageSum(form, allProducts))}</span>
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <Field label="Pakketprijs (leeg = som)">
                <input
                  type="number"
                  style={inputStyle}
                  value={form.priceOverride}
                  placeholder={String(packageSum(form, allProducts))}
                  onChange={(e) => setForm({ ...form, priceOverride: e.target.value })}
                />
              </Field>
            </div>
            <div style={{ flex: 1 }}>
              <Field label="Lessen tegoed (auto uit rijles-elementen)">
                <input type="number" style={inputStyle} value={form.lessons} onChange={(e) => setForm({ ...form, lessons: Number(e.target.value) })} />
              </Field>
            </div>
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={savePackage} style={{ flex: 1 }}>Opslaan</Btn>
            <Btn kind="ghost" onClick={() => setForm(null)}>Annuleren</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= INSTELLINGEN ================= */
function Instellingen({ data, update }) {
  const st = data.settings;
  const [section, setSection] = useState("bedrijf");

  const SECTIONS = [
    ["bedrijf", "🏢 Bedrijf"],
    ["facturen", "📄 Facturen"],
    ["berichten", "💬 Berichten"],
    ["reserveringen", "📆 Reserveringen"],
    ["agenda", "📅 Agenda"],
    ["team", "🧑‍🏫 Team"],
    ["voertuigen", "🚗 Voertuigen"],
  ];

  const setBooking = (k, v) =>
    update((d) => {
      if (!d.settings.booking) d.settings.booking = { ...DEFAULT_BOOKING };
      d.settings.booking[k] = v;
      return d;
    });

  const downloadAanvraagPagina = () => {
    const html = maakAanvraagPagina(st.booking || DEFAULT_BOOKING, st.company.name, data.products || []);
    const blob = new Blob([html], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "lesaanvraag.html";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const setMessage = (k, v) =>
    update((d) => {
      if (!d.settings.messages) d.settings.messages = { ...DEFAULT_MSG_TEMPLATES };
      d.settings.messages[k] = v;
      return d;
    });

  const setAgenda = (k, v) =>
    update((d) => {
      if (!d.settings.agenda) d.settings.agenda = { ...DEFAULT_AGENDA_SETTINGS };
      d.settings.agenda[k] = v;
      return d;
    });

  const setCompany = (k, v) =>
    update((d) => {
      d.settings.company[k] = v;
      return d;
    });
  const setText = (k, v) =>
    update((d) => {
      d.settings.texts[k] = v;
      return d;
    });
  const setInvoice = (k, v) =>
    update((d) => {
      if (!d.settings.invoice) d.settings.invoice = { ...DEFAULT_INVOICE_SETTINGS };
      d.settings.invoice[k] = v;
      return d;
    });

  const onLogo = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 400 / img.width);
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        const dataUrl = c.toDataURL("image/png");
        update((d) => {
          d.settings.logo = dataUrl;
          return d;
        });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(f);
  };

  const companyFields = [
    ["name", "Bedrijfsnaam"],
    ["address", "Straat + huisnummer"],
    ["zipcity", "Postcode + plaats"],
    ["phone", "Telefoon"],
    ["email", "E-mail"],
    ["website", "Website"],
    ["kvk", "KVK-nummer"],
    ["btwnr", "Btw-nummer"],
    ["iban", "IBAN"],
  ];

  const textFields = [
    ["factuur", "Standaardtekst onder factuur"],
    ["herinnering", "1e betalingsherinnering (vriendelijk)"],
    ["aanmaning", "2e aanmaning (dringend)"],
    ["aanmaning14", "Laatste aanmaning — 14-dagenbrief (wettelijk verplicht vóór incasso)"],
    ["offerte", "Standaardtekst offerte"],
    ["credit", "Standaardtekst creditfactuur"],

  return (
    <div>
      <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 12 }}>Instellingen</div>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>

            key={id}

              border: "none",
              cursor: "pointer",

              padding: "8px 14px",
              fontSize: 13,
              fontWeight: 700,
              fontFamily: "inherit",
              background: section === id ? "#16283E" : "#fff",
              color: section === id ? "#fff" : "#334155",
            }}
          >
            {label}
          </button>
        ))}
      </div>

      {/* Opslaan & reservekopie */}

          Alle instellingen en gegevens worden bij elke wijziging automatisch opgeslagen (zie het ✓-teken rechtsboven).
          Met de knoppen hieronder sla je alles extra op en bewaar je een reservekopie-bestand van je complete rijschool.
        </div>

          <Btn
            small
            onClick={() => {
              update((d) => ({ ...d }));

            💾 Nu alles opslaan

            kind="ghost"

                const lezer = new FileReader();
                lezer.onload = () => {

function PrintDoc({ data, doc, onClose }) {
  const { inv, mode } = doc;

  const s = data.students.find((x) => x.id === inv.studentId);

  const inv$ = st.invoice || {};
  const vat = Number(inv$.vat) || 0;
  const accent = inv$.accent || "#F7B32B";

  const total = inv.lines.reduce((t, l) => t + Number(l.qty || 0) * Number(l.price || 0), 0);
  const excl = vat > 0 ? total / (1 + vat / 100) : total;
  const btw = total - excl;

  const dueDate = (() => {
    const d = fromISO(inv.date);
    const days = { factuur: Number(inv$.dueDays) || 14, herinnering: 14, aanmaning: 7, aanmaning14: 16, offerte: 30 }[mode] || 14;
    d.setDate(d.getDate() + days);

    offerte: "OFFERTE",
    credit: "CREDITFACTUUR",
    herinnering: "BETALINGSHERINNERING",

    aanmaning14: "LAATSTE AANMANING",

    .replaceAll("{bedrag}", euro(total))
    .replaceAll("{nummer}", inv.number)

    const d = fromISO(iso);
    const M = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
    return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;

    <div
      className="print-overlay"

        position: "fixed",

        <Btn kind="ghost" onClick={onClose}>Sluiten</Btn>

        className="print-sheet"

          background: "#fff",
          maxWidth: 720,
          margin: "0 auto",
          borderRadius: 10,

            <div style={{ fontWeight: 700, color: "#16283E" }}>{c.name}</div>
            {c.address && <div>{c.address}</div>}
            {c.zipcity && <div>{c.zipcity}</div>}
            {c.phone && <div>{c.phone}</div>}
            {c.email && <div>{c.email}</div>}
            {c.website && <div>{c.website}</div>}
          </div>
        </div>

        <div style={{ fontSize: 24, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>{TITLES[mode]}</div>
        {isReminder && (
          <div style={{ fontSize: 13, color: "#64748B", marginBottom: 4 }}>Betreft factuur {inv.number} van {longDate(inv.date)}</div>

/* ================= HERBRUIKBARE LIJSTBEHEERDER ================= */
function ListManager({ items, fields, render, onSave, addLabel }) {
  const [draft, setDraft] = useState(null);

  const startNew = () => {
    const empty = { id: uid() };
    fields.forEach(([k, , , options]) => (empty[k] = options ? options[0] : ""));
    setDraft(empty);
  };

  const save = () => {
    const first = fields[0][0];
    if (!String(draft[first] || "").trim()) return alert("Vul minimaal het eerste veld in.");
    const exists = items.some((i) => i.id === draft.id);
    onSave(exists ? items.map((i) => (i.id === draft.id ? draft : i)) : [...items, draft]);
    setDraft(null);
  };

  const remove = (id) => {
    if (!window.confirm("Verwijderen?")) return;
    onSave(items.filter((i) => i.id !== id));
  };

  return (
    <div>
      {items.map((it) => (
        <div key={it.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #EDF1F6", fontSize: 14 }}>
          <span>{render(it)}</span>
          <span style={{ display: "flex", gap: 6 }}>
            <Btn kind="ghost" small onClick={() => setDraft({ ...it })}>✎</Btn>
            <Btn kind="danger" small onClick={() => remove(it.id)}>🗑</Btn>
          </span>
        </div>
      ))}

      {draft ? (
        <div style={{ marginTop: 10 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {fields.map(([k, label, flex, options]) =>
              options ? (
                <select key={k} style={{ ...inputStyle, flex }} value={draft[k]} onChange={(e) => setDraft({ ...draft, [k]: e.target.value })}>
                  {options.map((o) => (
                    <option key={o} value={o}>{o === "kantoor" ? "kantoormedewerker" : o}</option>
                  ))}
                </select>
              ) : (
                <input key={k} style={{ ...inputStyle, flex }} placeholder={label} value={draft[k]} onChange={(e) => setDraft({ ...draft, [k]: e.target.value })} />
              )
            )}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <Btn small onClick={save}>Opslaan</Btn>
            <Btn kind="ghost" small onClick={() => setDraft(null)}>Annuleren</Btn>
          </div>
        </div>
      ) : (
        <div style={{ marginTop: 10 }}>
          <Btn kind="ghost" small onClick={startNew}>{addLabel}</Btn>
        </div>
      )}
    </div>
  );
}

/* ================= SEPA BETAAL-QR (EPC-standaard) ================= */
function EpcQr({ name, iban, amount, remittance }) {
  const el = useRef(null);

  useEffect(() => {
    if (!el.current) return;
    el.current.innerHTML = "";
    if (!window.QRCode || !iban || !(amount > 0)) return;
    const payload = [
      "BCD",
      "002",
      "1",
      "SCT",
      "",
      String(name || "").slice(0, 70),
      String(iban).replace(/\s+/g, "").toUpperCase(),
      "EUR" + Number(amount).toFixed(2),
      "",
      "",
      String(remittance || "").slice(0, 140),
    ].join("\n");
    try {
      new window.QRCode(el.current, {
        text: payload,
        width: 128,
        height: 128,
        correctLevel: window.QRCode.CorrectLevel.M,
      });
    } catch (e) {
      /* QR-bibliotheek niet beschikbaar — alleen tekstinstructie tonen */
    }
  }, [name, iban, amount, remittance]);

  if (!window.QRCode) return null;

  return (
    <div style={{ textAlign: "center" }}>
      <div ref={el} style={{ padding: 8, background: "#fff", border: "1px solid #E2E8F0", borderRadius: 10, display: "inline-block" }} />
      <div style={{ fontSize: 10.5, color: "#94A3B8", marginTop: 4 }}>Scan & betaal</div>
    </div>
  );
}

/* ================= ROOSTER & AFWEZIGHEID PER INSTRUCTEUR ================= */
function RoosterCard({ member, onChange }) {
  const sched = member.schedule || { days: [0, 1, 2, 3, 4, 5], start: "08:00", end: "18:00" };
  const [absDraft, setAbsDraft] = useState(null);

  const setSched = (patch) => onChange({ ...member, schedule: { ...sched, ...patch } });

  const toggleDay = (i) => {
    const days = sched.days.includes(i) ? sched.days.filter((d) => d !== i) : [...sched.days, i].sort();
    setSched({ days });
  };

  const addAbsence = () => {
    if (!absDraft.from || !absDraft.to) return alert("Vul beide datums in.");
    if (absDraft.to < absDraft.from) return alert("De einddatum ligt vóór de begindatum.");
    onChange({ ...member, absences: [...(member.absences || []), { ...absDraft, id: uid() }] });
    setAbsDraft(null);
  };

  const removeAbsence = (id) => {
    if (!window.confirm("Deze afwezigheid verwijderen?")) return;
    onChange({ ...member, absences: (member.absences || []).filter((a) => a.id !== id) });
  };

  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 14 }}>
      <div style={{ fontWeight: 700, marginBottom: 10 }}>🧑‍🏫 {member.name} — rooster & afwezigheid</div>

      <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 6 }}>Werkdagen</div>
      <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
        {DAY_SHORT.map((d, i) => {
          const actief = sched.days.includes(i);
          return (
            <button
              key={d}
              onClick={() => toggleDay(i)}
              style={{
                flex: 1,
                border: "none",
                cursor: "pointer",
                borderRadius: 8,
                padding: "8px 0",
                fontWeight: 700,
                fontSize: 12,
                fontFamily: "inherit",
                background: actief ? "#16283E" : "#EDF1F6",
                color: actief ? "#fff" : "#94A3B8",
              }}
            >
              {d}
            </button>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <div style={{ flex: 1 }}>
          <Field label="Werkt van">
            <input type="time" style={inputStyle} value={sched.start} onChange={(e) => setSched({ start: e.target.value })} />
          </Field>
        </div>
        <div style={{ flex: 1 }}>
          <Field label="Tot">
            <input type="time" style={inputStyle} value={sched.end} onChange={(e) => setSched({ end: e.target.value })} />
          </Field>
        </div>
      </div>

      <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", margin: "4px 0 6px" }}>Afwezigheid / vakantie</div>
      {(member.absences || []).length === 0 && !absDraft && (
        <div style={{ fontSize: 13, color: "#94A3B8", marginBottom: 8 }}>Geen afwezigheid gepland.</div>
      )}
      {(member.absences || [])
        .slice()
        .sort((a, b) => a.from.localeCompare(b.from))
        .map((a) => (
          <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #EDF1F6", fontSize: 13 }}>
            <span>🏖 {niceDate(a.from)} t/m {niceDate(a.to)}{a.reason ? ` · ${a.reason}` : ""}</span>
            <Btn kind="danger" small onClick={() => removeAbsence(a.id)}>🗑</Btn>
          </div>
        ))}

      {absDraft ? (
        <div style={{ marginTop: 8 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <input type="date" style={{ ...inputStyle, flex: 1, minWidth: 130 }} value={absDraft.from} onChange={(e) => setAbsDraft({ ...absDraft, from: e.target.value })} />
            <input type="date" style={{ ...inputStyle, flex: 1, minWidth: 130 }} value={absDraft.to} onChange={(e) => setAbsDraft({ ...absDraft, to: e.target.value })} />
            <input style={{ ...inputStyle, flex: 2, minWidth: 140 }} placeholder="Reden (bijv. vakantie)" value={absDraft.reason} onChange={(e) => setAbsDraft({ ...absDraft, reason: e.target.value })} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <Btn small onClick={addAbsence}>Opslaan</Btn>
            <Btn kind="ghost" small onClick={() => setAbsDraft(null)}>Annuleren</Btn>
          </div>
        </div>
      ) : (
        <div style={{ marginTop: 8 }}>
          <Btn kind="ghost" small onClick={() => setAbsDraft({ from: "", to: "", reason: "" })}>+ Afwezigheid toevoegen</Btn>
        </div>
      )}
    </div>
  );
}

        <Field label="Wachtwoord">
          <input
            style={inputStyle}
            type="password"
            value={pw}
            autoComplete="current-password"
            onChange={(e) => setPw(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") doLogin(); }}
          />
        </Field>
        {err && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 10 }}>{err}</div>}
        <Btn onClick={doLogin} style={{ width: "100%", opacity: busy ? 0.7 : 1 }}>
          {busy ? "Bezig…" : "Inloggen"}
        </Btn>
        <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 12, textAlign: "center" }}>
          Inloggen kan met het account dat in Supabase is aangemaakt.
        </div>
        <div style={{ borderTop: "1px solid #E2E8F0", marginTop: 16, paddingTop: 14 }}>
          <Btn kind="ghost" style={{ width: "100%" }} onClick={onLokaal}>
            Verder zonder inloggen (alleen dit apparaat)
          </Btn>
          <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 8, textAlign: "center", lineHeight: 1.5 }}>
            Je werkt dan lokaal op dit apparaat: geen synchronisatie tussen apparaten en geen automatische
            lesaanvragen op het dashboard. Later inloggen zet je gegevens alsnog in de cloud.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
